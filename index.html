      function toggleDrawRoomEntryCheckIn(tournamentId, drawId) {
        if (!ensureTournamentManagerById(tournamentId)) return;

        updateTournament(
          tournamentId,
          (tournament) => {
            tournament.draw = (tournament.draw || []).map((entry) => {
              if (entry.id !== drawId) {
                return entry;
              }
              const keys = (entry.slots || []).map((slot) => getDrawSlotCheckInKey(slot)).filter(Boolean);
              const currentlyReady = keys.length
                ? keys.every((key) => Boolean(entry.entryCheckIns?.[key]))
                : false;
              const nextCheckIns = keys.reduce((result, key) => {
                result[key] = !currentlyReady;
                return result;
              }, {});
              return {
                ...entry,
                entryCheckIns: nextCheckIns,
              };
            });
            return addAudit(tournament, "Updated room check-in status.");
          },
          "Room check-ins updated.",
        );
      }

      function toggleDrawBallotCheckIn(tournamentId, drawId) {
        if (!ensureTournamentManagerById(tournamentId)) return;

        updateTournament(
          tournamentId,
          (tournament) => {
            tournament.draw = (tournament.draw || []).map((entry) =>
              entry.id === drawId
                ? {
                    ...entry,
                    ballotCheckedIn: !entry.ballotCheckedIn,
                  }
                : entry,
            );
            return addAudit(tournament, "Updated ballot return tracking for a room.");
          },
          "Ballot tracking updated.",
        );
      }

      function toggleJudgeAllocationCheckIn(tournamentId, allocationId) {
        if (!ensureTournamentManagerById(tournamentId)) return;

        updateTournament(
          tournamentId,
          (tournament) => {
            tournament.judgeAllocations = (tournament.judgeAllocations || []).map((allocation) =>
              allocation.id === allocationId
                ? {
                    ...allocation,
                    checkedIn: !allocation.checkedIn,
                    checkedInAt: !allocation.checkedIn ? timestamp() : "",
                    checkedInAtKey: !allocation.checkedIn ? Date.now() : 0,

      function updateRoundControl(tournamentId, formData) {
        const tournament = ensureTournamentManagerById(tournamentId);
        if (!tournament) return;

        const round = normalizeRoundCount(formData.get("round"), 1);
        const motionTitle = String(formData.get("motionTitle") || "").trim();
        const motionText = String(formData.get("motionText") || "").trim();
        const judgeNotes = String(formData.get("judgeNotes") || "").trim();
        const prepMinutes = normalizeOptionalCount(
          optionalNumberFromForm(formData, "prepMinutes", null),
          null,
          240,
        );
        const intent = String(formData.get("intent") || "save").trim().toLowerCase();

        if ((intent === "release" || intent === "start-prep") && !motionTitle && !motionText) {
          setFlash("error", "Add a motion title or motion text before releasing it.");
          renderApp();
          return;
        }

        updateTournament(
          tournamentId,
          (currentTournament) => {
            currentTournament.roundControls = buildRoundControls(
              currentTournament.rounds || 1,
              buildRoundControls(
                currentTournament.rounds || 1,
                currentTournament.roundControls || [],
              ).map((control) => {
                if (Number(control.round) !== Number(round)) {
                  return control;
                }
                const nextControl = createRoundControlRecord(round, {
                  ...control,
                  motionTitle,
                  motionText,
                  judgeNotes,
                  prepMinutes,
                });
                if (intent === "hide") {
                  nextControl.motionReleased = false;
                  nextControl.motionReleasedAt = "";
                  nextControl.motionReleasedAtKey = 0;
                  nextControl.prepStartedAt = "";
                  nextControl.prepStartedAtKey = 0;
                } else if (intent === "release") {
                  nextControl.motionReleased = true;
                  nextControl.motionReleasedAt = timestamp();
                  nextControl.motionReleasedAtKey = Date.now();
                } else if (intent === "start-prep") {
                  nextControl.motionReleased = true;
                  if (!nextControl.motionReleasedAtKey) {
                    nextControl.motionReleasedAt = timestamp();
                    nextControl.motionReleasedAtKey = Date.now();
                  }
                  nextControl.prepStartedAt = timestamp();
                  nextControl.prepStartedAtKey = Date.now();
                } else if (intent === "reset-prep") {
                  nextControl.prepStartedAt = "";
                  nextControl.prepStartedAtKey = 0;
                }
                return nextControl;
              }),
            );
            return addAudit(
              currentTournament,
              (intent === "hide"
                ? "Hid motion access"
                : intent === "release"
                  ? "Released motion"
                  : intent === "start-prep"
                    ? "Started prep"
                    : intent === "reset-prep"
                      ? "Reset prep"
                      : "Saved round control") +
                " for Round " +
                round +
                ".",
            );
          },
          intent === "hide"
            ? "Round motion hidden."
            : intent === "release"
              ? "Round motion released."
              : intent === "start-prep"
                ? "Prep timer started."
                : intent === "reset-prep"
                  ? "Prep timer reset."
                  : "Round control saved.",
        );
      }

      function deleteTournamentNotice(tournamentId, noticeId) {
        if (!ensureTournamentManagerById(tournamentId)) return;

        updateTournament(
          tournamentId,
          (tournament) => {
            tournament.notices = (tournament.notices || []).filter(

      function generateTournamentDraw(tournamentId, formData) {
        const tournament = ensureTournamentManagerById(tournamentId);
        if (!tournament) return;
        const round = normalizeRoundCount(formData.get("round"), 1);
        const roundProfile = getRoundProfileForRound(tournament, round);
        const method = String(formData.get("method") || "power").trim().toLowerCase();
        const requestedRoomSize = normalizeOptionalCount(
          optionalNumberFromForm(formData, "teamsPerRoom", null),
          normalizeOptionalCount(
            roundProfile.teamsPerRoom,
            normalizeOptionalCount(tournament.config.teamsPerRoom, 2),
          ),
          8,
        );
        const previewPlan = getDrawGenerationPlan(
          tournament,
          roundProfile,
          method,
          requestedRoomSize,
        );
        const previewStructure = getEffectiveRoundStructure(tournament, roundProfile, {
          roomSizeOverride: requestedRoomSize,
          allowRoomOverride: true,
        });
        const previewRoomSize = Math.max(1, Number(previewStructure.teamsPerRoom) || 1);
        const previewHasOverflow =
          previewPlan.overflowParticipants.length > 0 ||
          previewPlan.entries.length % previewRoomSize !== 0;
        if (previewPlan.entries.length < previewRoomSize) {
          setFlash(
            "error",
            shouldGenerateSpeakerPairingTeams(tournament, roundProfile)
              ? "Add enough speakers to build at least one full room from this round configuration."
              : "Add enough complete entries to build at least one full room before generating a draw.",
          );
          renderApp();
          return;
        }

        updateTournament(
          tournamentId,
          (tournament) => {
            const round = normalizeRoundCount(formData.get("round"), 1);
            const roundProfile = getRoundProfileForRound(tournament, round);
            const method = String(formData.get("method") || "power").trim().toLowerCase();
            const generationPlan = getDrawGenerationPlan(
              tournament,
              roundProfile,
              method,
              requestedRoomSize,
            );
            const effectiveStructure = getEffectiveRoundStructure(tournament, roundProfile, {
              roomSizeOverride: requestedRoomSize,
              allowRoomOverride: true,
            });
            const roomSize = Math.max(
              1,
              Number(effectiveStructure.teamsPerRoom) || Number(generationPlan.roomSize) || 2,
            );
            const roomPrefix = String(formData.get("roomPrefix") || "Room").trim() || "Room";
            const roomStart = Math.max(1, numberFromForm(formData, "roomStart", 1));
            const releaseNow = boolFromForm(formData, "releaseNow");
            let entries = generationPlan.entries;

            if (method === "random") {
              entries = shuffleEntries(entries);
            } else {
              entries = [...entries].sort((left, right) =>
                compareDrawEntries(tournament, left, right),
              );
              if (method === "fold") {
                entries = foldEntries(entries);
              }
            }

            const safeRoomSize = Math.max(1, Number(roomSize) || 2);
            const fullEntryCount = Math.floor(entries.length / safeRoomSize) * safeRoomSize;
            const groups = chunkEntries(entries.slice(0, fullEntryCount), safeRoomSize);
            const overflowEntries = entries.slice(fullEntryCount);
            const overflowParticipants = generationPlan.overflowParticipants || [];
            const hasOverflow = overflowEntries.length > 0 || overflowParticipants.length > 0;
            tournament.draw = (tournament.draw || []).filter(
              (entry) => Number(entry.round) !== Number(round),
            );
            tournament.judgeAllocations = (tournament.judgeAllocations || []).filter(
              (allocation) => Number(allocation.round) !== Number(round),
            );
            tournament.draw.push(
              ...groups.map((group, index) =>
                createDrawRecord(tournament, {
                  round,
                  room: roomPrefix + " " + (roomStart + index),
                  status: releaseNow ? "Published" : "Draft",
                  priority: getAutoPriorityValue(index, groups.length, method),
                  entries: group,
                }),
              ),
            );
            if (hasOverflow) {
              tournament.draw.push(
                createDrawRecord(tournament, {
                  round,
                  room: roomPrefix + " " + (roomStart + groups.length) + " Overflow",
                  status: "Draft",
                  priority: 1,
                  matchup: formatOverflowDrawMatchup(overflowEntries, overflowParticipants),
                  disableMatchupInference: true,
                  entryIds: overflowEntries
                    .map((entry) => String(entry.id || "").trim())
                    .filter(Boolean),
                  teamIds: overflowEntries
                    .map((entry) => getDrawEntryTeamId(entry))
                    .filter(Boolean),
                  participantIds: Array.from(
                    new Set(
                      overflowEntries
                        .flatMap((entry) => getDrawEntryParticipantIds(entry))
                        .concat(
                          overflowParticipants
                            .map((participant) => String(participant?.id || "").trim())
                            .filter(Boolean),
                        ),
                    ),
                  ),
                }),
              );
            }
            tournament.draw = tournament.draw.sort(
              (left, right) => Number(left.round) - Number(right.round),
            );
            return addAudit(
              tournament,
              "Generated a " +
                method +
                " draw for Round " +
                round +
                (releaseNow ? " and released it." : " as a draft.") +
                (hasOverflow ? " Overflow entries were left in a separate draft room." : ""),
            );
          },
          previewHasOverflow
            ? "Round draw generated. Overflow entries were left in a separate draft room."
            : "Round draw generated.",
        );
      }

      function releaseDrawRound(tournamentId, roundValue) {
        const tournament = ensureTournamentManagerById(tournamentId);
        if (!tournament) return;
        const round = normalizeRoundCount(roundValue, 1);
        if (!(tournament.draw || []).some((entry) => Number(entry.round) === Number(round))) {
          setFlash("error", "There are no rooms saved for that round yet.");
          renderApp();
          return;
        }
        const conflictSummary = getRoundConflictSummary(tournament, round);

        updateTournament(
          tournamentId,
          (tournament) => {
            let changed = false;
            tournament.draw = (tournament.draw || []).map((entry) => {
              if (Number(entry.round) === Number(round)) {
                changed = true;
                return {
                  ...entry,
                  status: "Published",
                  publishedAt: entry.publishedAt || timestamp(),
                  publishedAtKey:
                    normalizeTimestampKey(entry.publishedAtKey, entry.publishedAt) || Date.now(),
                };
              }
              return entry;
            });
            if (!changed) {
              return tournament;
            }
            return addAudit(tournament, "Released the draw for Round " + round + ".");
          },
          conflictSummary.total
            ? "Round released with " +
                conflictSummary.total +
                " flagged conflict" +
                (conflictSummary.total === 1 ? "" : "s") +
                " to review."
            : "Round released.",
        );
      }

      function generateRandomTeams(tournamentId) {
        if (!ensureTournamentManagerById(tournamentId)) return;

        updateTournament(
          tournamentId,
          (tournament) => {
            if (!tournament.config.randomTeamsAllowed) {
              return tournament;
            }

            const participants = clone(tournament.participants);
            for (let index = participants.length - 1; index > 0; index -= 1) {
              const swapIndex = Math.floor(Math.random() * (index + 1));
              const temp = participants[index];
              participants[index] = participants[swapIndex];
              participants[swapIndex] = temp;
            }

            const teamSize = Math.max(
              1,
              Number(getRoundProfileForRound(tournament, 1).teamSize) ||
                Number(tournament.config.teamSize) ||
                1,
            );
            const generatedTeams = [];
            tournament.participants = participants.map((participant, index) => {
              const teamNumber = Math.floor(index / teamSize) + 1;
              let generatedTeam = generatedTeams[teamNumber - 1];
              if (!generatedTeam) {
                generatedTeam = createTeamRecord(tournament.code + " Random Team " + teamNumber, "", {
                  notes: "Randomly generated team.",
                  source: "generated",
                });
                generatedTeams.push(generatedTeam);
              }
              return {
                ...participant,
                teamId: generatedTeam.id,
                teamName: generatedTeam.name,
              };
            });
            tournament.teams = [
              ...(tournament.teams || []).filter(
                (team) => !String(team.name || "").startsWith(tournament.code + " Random Team "),
              ),
              ...generatedTeams,
            ];
            synchronizeTournamentTeamReferences(tournament);

            return addAudit(tournament, "Generated random teams for eligible participants.");
          },
          "Random teams generated.",
        );
      }

      function submitJudgeBallot(tournamentId, allocationId, formData) {
        const tournament = ensureJudgeAccessById(tournamentId);
        if (!tournament) return;

        const targetAllocation = getJudgeAllocationsForTournament(tournament).find(
          (allocation) => allocation.id === allocationId,
        );
        if (!targetAllocation) {
          setFlash("error", "That judge allocation could not be found.");
          renderApp();
          return;
        }

        const actingJudgeEmail = normalizeEmail(session.userEmail);
        if (normalizeEmail(targetAllocation.judgeEmail) !== actingJudgeEmail) {
          setFlash("error", "You can only submit ballots for your own judge allocations.");
          renderApp();
          return;
        }

        if (normalizeJudgeAllocationRole(targetAllocation.panelRole, "panelist") !== "chair") {
          setFlash("error", "Only the assigned chair can submit the official ballot for that room.");
          renderApp();
          return;
        }

        if (targetAllocation.submittedAt) {
          setFlash(
            "error",
            "That ballot has already been submitted and locked. Only a tournament manager can reopen it.",
          );
          renderApp();
          return;
        }

        const targetDrawEntry = getDrawEntryById(tournament, targetAllocation.drawId);
        const roomSlots = Array.isArray(targetDrawEntry?.slots) ? targetDrawEntry.slots : [];
        const resultMode = getDrawOfficialResultMode(tournament, targetDrawEntry);
        let officialResults = {};

        if (resultMode === "bp_rank" && roomSlots.length) {
          const roomPlacements = roomSlots.map((slot) => {
            const slotKey = getDrawSlotCheckInKey(slot);
            return {
              slotKey,
              rank: normalizeOptionalCount(
                formData.get(getJudgeRoomResultFieldName(slotKey)),
                null,
                roomSlots.length,
              ),
            };
          });

          if (roomPlacements.some((entry) => !entry.rank)) {
            setFlash("error", "Every team in the room needs an official placement before the ballot can be submitted.");
            renderApp();
            return;
          }

          if (new Set(roomPlacements.map((entry) => entry.rank)).size !== roomPlacements.length) {
            setFlash("error", "Each BP team needs a unique room placement.");
            renderApp();
            return;
          }

          officialResults = roomPlacements.reduce((result, entry) => {
            result[entry.slotKey] = { rank: entry.rank };
            return result;
          }, {});
        }

        if (resultMode === "win_loss" && roomSlots.length) {
          const roomOutcomes = roomSlots.map((slot) => {
            const slotKey = getDrawSlotCheckInKey(slot);
            return {
              slotKey,
              outcome: String(
                formData.get(getJudgeRoomResultFieldName(slotKey)) || "",
              ).trim().toLowerCase(),
            };
          });

          if (roomOutcomes.some((entry) => !["win", "loss"].includes(entry.outcome))) {
            setFlash("error", "Every side in the room needs an official win or loss result before the ballot can be submitted.");
            renderApp();
            return;
          }

          if (roomSlots.length === 2) {
            const wins = roomOutcomes.filter((entry) => entry.outcome === "win").length;
            const losses = roomOutcomes.filter((entry) => entry.outcome === "loss").length;
            if (wins !== 1 || losses !== 1) {
              setFlash("error", "Two-side rooms need exactly one winning side and one losing side.");
              renderApp();
              return;
            }
          }

          officialResults = roomOutcomes.reduce((result, entry) => {
            result[entry.slotKey] = { outcome: entry.outcome };
            return result;
          }, {});
        }

        const participantIds =
          targetAllocation.participantIds?.length
            ? targetAllocation.participantIds
            : getParticipantsForDrawRecord(
                tournament,
                getDrawEntryById(tournament, targetAllocation.drawId),
              ).map((participant) => participant.id);
        const optionalScoreConfig = getRoundOptionalScoreConfig(
          tournament,
          targetAllocation.round,
        );

        const missingSpeakerScore = participantIds.some((participantId) => {
          return (
            parseBallotScoreValue(
              formData.get(getJudgeScoreFieldName(participantId, "Speaker Score")),
            ) === null
          );
        });

        if (missingSpeakerScore) {
          setFlash("error", "Every adjudicated speaker needs a speaker score before the ballot can be submitted.");
          renderApp();
          return;
        }

        updateTournament(
          tournamentId,
          (currentTournament) => {
            const submittedAt = timestamp();
            const submittedAtKey = Date.now();
            currentTournament.participants = (currentTournament.participants || []).map(
              (participant) => {
                if (!participantIds.includes(participant.id)) {
                  return participant;
                }

                const speakerScore =
                  parseBallotScoreValue(
                    formData.get(getJudgeScoreFieldName(participant.id, "Speaker Score")),
                  ) ?? 0;
                const scores = {
                  "Speaker Score": speakerScore,
                };

                (currentTournament.settings.feedbackCategories || []).forEach((category) => {
                  const rawValue = parseBallotScoreValue(
                    formData.get(getJudgeScoreFieldName(participant.id, category)),
                  );
                  if (rawValue !== null) {
                    scores[category] = rawValue;
                  }
                });

                if (optionalScoreConfig.crossExaminationEnabled) {
                  const questionValue = parseBallotScoreValue(
                    formData.get(getJudgeCrossQuestionFieldName(participant.id)),
                  );
                  const responseValue = parseBallotScoreValue(
                    formData.get(getJudgeCrossResponseFieldName(participant.id)),
                  );
                  if (questionValue !== null) {
                    scores["Cross Examination Questions"] = questionValue;
                  }
                  if (responseValue !== null) {
                    scores["Cross Examination Responses"] = responseValue;
                  }
                }

                if (optionalScoreConfig.rebuttalEnabled) {
                  const rebuttalValue = parseBallotScoreValue(
                    formData.get(getJudgeRebuttalFieldName(participant.id)),
                  );
                  if (rebuttalValue !== null) {
                    scores.Rebuttal = rebuttalValue;
                  }
                }

                const nextEntry = {
                  id:
                    getExistingJudgeFeedback(
                      participant,
                      targetAllocation.id,
                      targetAllocation.judgeEmail,
                    )?.id || createId("feedback"),
                  allocationId: targetAllocation.id,
                  drawId: targetAllocation.drawId,
                  round: targetAllocation.round,
                  judgeEmail: normalizeEmail(targetAllocation.judgeEmail),
                  speakerScore,
                  scores,
                  note: String(
                    formData.get(getJudgeNoteFieldName(participant.id)) || "",
                  ).trim(),
                  createdAt: submittedAt,
                };

                return {
                  ...participant,
                  feedback: [
                    ...(participant.feedback || []).filter(
                      (entry) =>
                        !(
                          String(entry.allocationId || "") === String(targetAllocation.id) &&
                          normalizeEmail(entry.judgeEmail) ===
                            normalizeEmail(targetAllocation.judgeEmail)
                        ),
                    ),
                    nextEntry,
                  ],
                };
              },
            );

            currentTournament.judgeAllocations = (currentTournament.judgeAllocations || []).map(
              (allocation) =>
                allocation.id === targetAllocation.id
                  ? {
                      ...allocation,
                      status: "submitted",
                      checkedIn: true,
                      checkedInAt: allocation.checkedInAt || submittedAt,
                      checkedInAtKey:
                        normalizeTimestampKey(allocation.checkedInAtKey, allocation.checkedInAt) ||
                        submittedAtKey,
                      submittedAt,
                      submittedAtKey,
                    }
                  : allocation,
            );
            currentTournament.draw = (currentTournament.draw || []).map((entry) =>
              entry.id === targetAllocation.drawId
                ? {
                    ...entry,
                    officialResults:
                      resultMode !== "speaker_only"
                        ? normalizeDrawOfficialResults(officialResults)
                        : normalizeDrawOfficialResults(entry.officialResults),
                    ballotCheckedIn: true,
                  }
                : entry,
            );

            return addAudit(
              currentTournament,
              "Judge ballot submitted for Round " +
                targetAllocation.round +
                ", " +
                targetAllocation.room +
                ".",
            );
          },
          "Judge ballot submitted.",
        );
      }

      function updateUserRole(email, formData) {
        if (!canAccessGlobalSettings()) {
          setFlash("error", "Only System Managers can change global roles.");
          renderApp();

      function deleteUser(email) {
        if (!canAccessGlobalSettings()) {
          setFlash("error", "Only System Managers can remove user accounts.");
          renderApp();
          return;
        }

        const target = normalizeEmail(email);
        if (target === normalizeEmail(MANAGER_EMAIL)) {
          setFlash("error", "The protected manager account cannot be deleted.");
          renderApp();
          return;
        }

        removePasswordFromDeviceVault(target);
        if (normalizeEmail(authPrefs?.rememberedEmail) === target) {
          authPrefs = normalizeAuthPrefs({
            rememberedEmail: "",
            savePasswordOnDevice: false,
          });
          saveAuthPrefs();
        }

        state.users = state.users.filter((user) => user.email !== target);
        state.recoveryRequests = (state.recoveryRequests || []).map((request) =>
          normalizeEmail(request.email) === target
            ? {
                ...request,
                status: "resolved",
                resolvedAt: timestamp(),
                resolvedBy: normalizeEmail(session.userEmail),
              }
            : request,
        );
        state.tournaments = state.tournaments.map((tournament) => {
          const updatedPermissions = {
            ...tournament.permissions,
            managerEmails: (tournament.permissions.managerEmails || []).filter(
              (entry) => entry !== target,
            ),
            tabManagerEmails: (tournament.permissions.tabManagerEmails || []).filter(
              (entry) => entry !== target,
            ),
            judgeEmails: (tournament.permissions.judgeEmails || []).filter(
              (entry) => entry !== target,
            ),
            debaterEmails: (tournament.permissions.debaterEmails || []).filter(
              (entry) => entry !== target,
            ),
          };
          return addAudit(
            {
              ...tournament,
              permissions: updatedPermissions,
            },
            "Removed user account " + target + " from the platform directory.",
          );
        });

        if (normalizeEmail(session.userEmail) === target) {
          session.userEmail = "";
          session.view = "overview";
          session.managedTournamentId = "";
        }

        persist("success", "User removed from the database.");

      async function updateDevicePasswordPreference(formData) {
        const currentUser = getCurrentUser();
        if (!currentUser) {
          setFlash("error", "Sign in again before changing password-saving preferences.");
          renderApp();
          return;
        }

        const shouldSavePassword = boolFromForm(formData, "savePasswordOnDevice");
        const currentPassword = String(formData.get("currentPassword") || "");

        if (!shouldSavePassword) {
          updateAuthPrefsAfterCredentialChoice(currentUser.email, false);
          removePasswordFromDeviceVault(currentUser.email);
          await reduceDevicePasswordAutoSignIn();
          setFlash(
            "success",
            "JADE will stop remembering your device password preference for this account. If you want to fully delete a saved password, remove it from your browser or device password manager too.",
          );
          renderApp();
          return;
        }

        if (!supportsDevicePasswordSaving()) {
          setFlash(
            "error",
            "This browser does not support secure in-app device password saving.",
          );
          renderApp();
          return;
        }

        if (!currentPassword) {
          setFlash("error", "Enter your current password before saving it on this device.");
          renderApp();
          return;
        }

        const passwordCheck = await verifyUserPassword(currentUser, currentPassword);
        if (!passwordCheck.ok) {
          setFlash("error", "That current password is incorrect.");
          renderApp();
          return;
        }

        if (passwordCheck.needsUpgrade) {
          Object.assign(currentUser, await buildSecurePasswordRecord(currentPassword));
          saveState();
        }

        updateAuthPrefsAfterCredentialChoice(currentUser.email, true);
        await savePasswordToDeviceVault(currentUser.email, currentPassword);
        await saveBrowserCredential(currentUser.name, currentUser.email, currentPassword);
        setFlash(
          "success",
          "Your password-saving preference has been updated for this device.",
        );
        renderApp();
      }

            assignTournamentRole(form.dataset.id, formData.get("roleKey"), formData.get("email"));
            return;
          }

          if (form.dataset.form === "add-participant") {
            addParticipant(form.dataset.id, formData);
            return;
          }

          if (form.dataset.form === "add-judge") {
            addJudge(form.dataset.id, formData);
            return;
          }

          if (form.dataset.form === "assign-judge") {
            assignJudgeAllocation(form.dataset.id, formData);
            return;
          }

          if (form.dataset.form === "auto-allocate-judges") {
            autoAllocateJudges(form.dataset.id, formData);
            return;
          }

          if (form.dataset.form === "update-round-control") {
            updateRoundControl(form.dataset.id, formData);
            return;
          }

          if (form.dataset.form === "post-tournament-notice") {
            postTournamentNotice(form.dataset.id, formData);
            return;
          }

          if (form.dataset.form === "add-standing") {
            addStanding(form.dataset.id, formData);
            return;
          }

          if (form.dataset.form === "add-draw") {
            addDrawRow(form.dataset.id, formData);
            return;
          }

          if (form.dataset.form === "update-draw-room") {
            updateDrawRoom(form.dataset.id, form.dataset.drawId, formData);
            return;
          }

          if (form.dataset.form === "generate-draw") {
            generateTournamentDraw(form.dataset.id, formData);
            return;
          }

          if (form.dataset.form === "release-draw-round") {
            releaseDrawRound(form.dataset.id, formData.get("round"));
            return;
          }

          if (form.dataset.form === "clear-draw-round") {
            requestActionConfirmation({
              action: "clear-draw-round",
              id: form.dataset.id,
              round: formData.get("round"),
            });
            return;
          }

          if (form.dataset.form === "submit-judge-ballot") {
            submitJudgeBallot(form.dataset.id, form.dataset.allocationId, formData);
            return;
          }

          if (form.dataset.form === "update-user-role") {
            updateUserRole(form.dataset.email, formData);
            return;
          }

          if (form.dataset.form === "reset-user-password") {
            await resetUserPassword(form.dataset.email, formData.get("password"));
            return;
          }

          if (form.dataset.form === "resolve-recovery-request") {
            await resolveRecoveryRequest(form.dataset.requestId, formData.get("password"));
            return;
          }

          if (form.dataset.form === "people-assign-access") {
            assignTournamentRole(
              formData.get("tournamentId"),
              formData.get("roleKey"),
              formData.get("email"),
            );
            return;
          }

          if (form.dataset.form === "update-tournament-appointee") {
            updateTournamentAppointeeRole(
              form.dataset.id,
              form.dataset.email,
              formData.get("roleKey"),
            );
            return;
          }

          if (form.dataset.form === "update-branding") {
            updateBranding(formData);
            return;
          }

          if (form.dataset.form === "update-user-preferences") {
            updateUserPreferences(formData);
            return;
          }

          if (form.dataset.form === "update-device-password-preference") {
            await updateDevicePasswordPreference(formData);
            return;
          }

          if (form.dataset.form === "update-security") {
            updateSecurity(formData);
            return;
          }

          if (form.dataset.form === "update-portal") {
            updatePortal(formData);
          }
        });

        document.addEventListener("change", (event) => {
          const configurationForm = event.target.closest(
            'form[data-form="create-tournament"], form[data-form="tournament-settings"]',
          );
          if (configurationForm) {
            if (event.target.matches('select[name="format"]')) {
              syncTournamentConfigurationForm(configurationForm);
              return;
            }

            if (event.target.matches('select[name="participantModel"]')) {
              syncTournamentConfigurationForm(configurationForm, {
                preserveParticipantModel: true,
                preserveRoundPlanner: true,
                useCurrentScoringValue: true,
              });
              return;
            }

            if (event.target.matches('input[name="rounds"]')) {
              refreshTournamentRoundPlanner(configurationForm);
              return;
            }

            if (
              event.target.matches(
                'input[name="teamsPerRoom"], input[name="teamSize"], input[name="speakersPerSide"]',
              )
            ) {
              refreshTournamentRoundPlanner(configurationForm, {
                syncDefaultsWithBaseConfig: true,
              });
              return;
            }

            if (event.target.matches('select[name^="roundFormat-"]')) {
              const round = String(event.target.name || "").replace("roundFormat-", "");
              syncRoundPlannerRowFromFormat(configurationForm, round);
              return;
            }
          }

          const select = event.target.closest("[data-round-control-select]");
          if (!select) return;

          const form = select.closest("form");
          const selectedOption = select.options[select.selectedIndex];
          if (!form || !selectedOption) return;

          const motionTitle = form.querySelector('input[name="motionTitle"]');
          const motionText = form.querySelector('textarea[name="motionText"]');
          const judgeNotes = form.querySelector('textarea[name="judgeNotes"]');
          const prepMinutes = form.querySelector('input[name="prepMinutes"]');
          const status = form.querySelector("[data-round-control-status]");
          const prepStatus = form.querySelector("[data-round-control-prep]");

          if (motionTitle) {
            motionTitle.value = selectedOption.dataset.motionTitle || "";
          }
          if (motionText) {
            motionText.value = selectedOption.dataset.motionText || "";
          }
          if (judgeNotes) {
            judgeNotes.value = selectedOption.dataset.judgeNotes || "";
          }
          if (prepMinutes) {
            prepMinutes.value = selectedOption.dataset.prepMinutes || "";
          }
          if (status) {
            status.textContent = selectedOption.dataset.motionStatus || "Locked";
          }
          if (prepStatus) {
            prepStatus.textContent = selectedOption.dataset.prepStatus || "No prep timer set";
          }
        });
      }

      async function boot() {
        startStartupSplashSequence();
        try {
          session = loadStoredSession();
          state = await loadState();
          await hydrateAuthAutofill();
          await applyUserAccessLinkFromUrl();
          updateCurrentUserRecord();
          applyBranding();
          saveSession();
          installEventHandlers();
          renderApp();
        } catch (error) {
          console.error(error);
          startupSplashFailed = true;
          setStartupSplashProgress(
            100,
            "Load interrupted",
            "JADE could not finish loading. Please refresh and try again.",
          );
          document.querySelector("#app").innerHTML =
            '<div class="page-shell"><section class="surface"><h2>JADE could not finish loading.</h2><p class="muted">Please refresh the page and try again.</p></section></div>';
        } finally {
          await finishStartupSplash();
        }
      }

      boot();
    </script>
  </body>
</html>
