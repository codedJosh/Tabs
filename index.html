      function renderJudgeAssignmentCard(assignment) {
        const { tournament, allocation, participants, drawEntry, judge } = assignment;
        const orderedParticipants = orderParticipantsForDrawEntry(
          tournament,
          drawEntry,
          participants,
        );
        const feedbackCategories = tournament.settings.feedbackCategories || [];
        const isChair = normalizeJudgeAllocationRole(allocation.panelRole, "panelist") === "chair";
        const ballotLocked = Boolean(allocation.submittedAt);
        const resultMode = getDrawOfficialResultMode(tournament, drawEntry);
        const roomSlots = Array.isArray(drawEntry?.slots) ? drawEntry.slots : [];
        const matchupLabel = drawEntry
          ? getDrawMatchupForDisplay(tournament, drawEntry, {
              forcePrivate: true,
            })
          : String(allocation.matchup || "").trim() || "No matchup attached yet.";
        const roleLabels = getDrawRoleDisplayLabels(tournament, drawEntry);
        const officialChair = getChairAllocationForDrawEntry(tournament, allocation.drawId);
        const officialChairJudge = officialChair
          ? getJudgeByEmail(tournament, officialChair.judgeEmail)
          : null;
        const roundControl = getRoundControlForRound(tournament, allocation.round);
        const optionalScoreConfig = getRoundOptionalScoreConfig(tournament, allocation.round);
        const visibleNotices = getVisibleTournamentNotices(tournament, {
          scope: "judge",
          limit: 2,
        });

        return `
          <article class="ballot-card">
            <div class="section-heading">
              <div>
                <p class="eyebrow">${escapeHtml(tournament.name)}</p>
                <h3>${escapeHtml("Round " + allocation.round + " • " + allocation.room)}</h3>
              </div>
              <div class="button-row">
                <span class="judge-status-pill">${escapeHtml(
                  getJudgeAllocationRoleLabel(allocation.panelRole),
                )}</span>
                <span class="judge-status-pill">${escapeHtml(
                  toTitleLabel(allocation.status || "assigned"),
                )}</span>
                <button class="secondary-button" type="button" data-action="toggle-judge-self-checkin" data-id="${escapeHtml(
                  tournament.id,
                )}" data-allocation-id="${escapeHtml(allocation.id)}">${escapeHtml(
                  allocation.checkedIn ? "Undo My Check-In" : "Check In",
                )}</button>
              </div>
            </div>
            <p class="muted">${escapeHtml(matchupLabel)}</p>
            ${
              roleLabels.length
                ? `<div class="workspace-chip-row">
                    ${roleLabels
                      .map(
                        (label) =>
                          `<span class="mini-pill success">${escapeHtml(label)}</span>`,
                      )
                      .join("")}
                  </div>`
                : ""
            }
            ${
              judge
                ? `<p class="fine-print">${escapeHtml(
                    getJudgePanelQualityLabel(judge.panelQuality) +
                      " • " +
                      getJudgeQualityTierLabel(judge.qualityTier),
                  )}</p>`
                : ""
            }
            <div class="workspace-chip-row">
              <span class="mini-pill ${escapeHtml(
                getRoundMotionStatus(roundControl).tone,
              )}">${escapeHtml(getRoundMotionStatus(roundControl).label)}</span>
              <span class="mini-pill success">${escapeHtml(getRoundPrepSummary(roundControl))}</span>
            </div>
            ${
              roundControl.motionReleased &&
              (roundControl.motionTitle || roundControl.motionText || roundControl.judgeNotes)
                ? `<div class="flat-panel">
                    <strong>${escapeHtml(roundControl.motionTitle || "Round motion")}</strong>
                    <p class="muted">${escapeHtml(
                      roundControl.motionText || "Motion details are being coordinated by the tab room.",
                    )}</p>
                    ${
                      roundControl.judgeNotes
                        ? `<p class="fine-print">${escapeHtml(
                            "Judge note: " + roundControl.judgeNotes,
                          )}</p>`
                        : ""
                    }
                  </div>`
                : ""
            }
            ${
              visibleNotices.length
                ? `<div class="notice-list compact">
                    ${visibleNotices
                      .map(
                        (notice) => `
                          <article class="notice-item">
                            <strong>${escapeHtml(notice.title || "Tournament notice")}</strong>
                            <p class="muted">${escapeHtml(notice.message)}</p>
                          </article>
                        `,
                      )
                      .join("")}
                  </div>`
                : ""
            }
            ${
              orderedParticipants.length
                ? isChair
                  ? ballotLocked
                    ? `
                  <div class="alert success">
                    This official ballot was submitted on ${escapeHtml(
                      allocation.submittedAt,
                    )} and is now locked. Only tournament managers can reopen it for corrections.
                  </div>
                  ${
                    getDrawOfficialResultSummary(tournament, drawEntry)
                      ? `<div class="flat-panel">
                          <strong>Official Room Result</strong>
                          <p class="muted">${escapeHtml(
                            getDrawOfficialResultSummary(tournament, drawEntry),
                          )}</p>
                        </div>`
                      : ""
                  }
                  <div class="leaderboard-list">
                    ${orderedParticipants
                      .map((participant) => {
                        const slotDetails = getParticipantDrawSlotDetails(
                          tournament,
                          drawEntry,
                          participant,
                        );
                        const existing = getExistingJudgeFeedback(
                          participant,
                          allocation.id,
                          allocation.judgeEmail,
                        );
                        return `
                          <div class="leaderboard-row">
                            <div class="stack">
                              <strong>${escapeHtml(participant.name)}</strong>
                              <span class="muted">${escapeHtml(slotDetails.label)}</span>
                              <span class="fine-print">${escapeHtml(
                                "Speaker score: " +
                                  formatScoreValue(
                                    existing?.speakerScore ??
                                      getFeedbackSpeakerScore(existing) ??
                                      0,
                                  ),
                              )}</span>
                              ${
                                existing?.note
                                  ? `<span class="fine-print">${escapeHtml(existing.note)}</span>`
                                  : ""
                              }
                            </div>
                          </div>
                        `;
                      })
                      .join("")}
                  </div>
                `
                    : `
                  <form class="stack" data-form="submit-judge-ballot" data-id="${escapeHtml(
                    tournament.id,
                  )}" data-allocation-id="${escapeHtml(allocation.id)}">
                    <div class="ballot-grid">
                      ${
                        resultMode !== "speaker_only" && roomSlots.length
                          ? `
                            <section class="ballot-speaker-card ballot-room-result-card">
                              <div class="section-heading">
                                <div>
                                  <strong>Official Room Result</strong>
                                  <p class="muted">${escapeHtml(
                                    getJudgeRoomResultGuideText(tournament, drawEntry),
                                  )}</p>
                                </div>
                                <span class="mini-pill success">${escapeHtml(
                                  resultMode === "bp_rank" ? "Placements" : "Side result",
                                )}</span>
                              </div>
                              <div class="field-grid ${escapeHtml(
                                roomSlots.length >= 4 ? "four" : roomSlots.length === 3 ? "three" : "two",
                              )}">
                                ${roomSlots
                                  .map(
                                    (slot, index) => `
                                      <label>
                                        ${escapeHtml(
                                          getDrawSlotDisplayLabel(tournament, slot, {
                                            drawEntry,
                                            slotIndex: index,
                                          }),
                                        )}
                                        <select name="${escapeHtml(
                                          getJudgeRoomResultFieldName(getDrawSlotCheckInKey(slot)),
                                        )}" required>${getJudgeRoomResultOptionsMarkup(
                                          tournament,
                                          drawEntry,
                                          slot,
                                        )}</select>
                                      </label>
                                    `,
                                  )
                                  .join("")}
                              </div>
                            </section>
                          `
                          : ""
                      }
                      ${orderedParticipants
                        .map((participant) => {
                          const slotDetails = getParticipantDrawSlotDetails(
                            tournament,
                            drawEntry,
                            participant,
                          );
                          const existing = getExistingJudgeFeedback(
                            participant,
                            allocation.id,
                            allocation.judgeEmail,
                          );
                          return `
                            <section class="ballot-speaker-card">
                              <div class="section-heading">
                                <div>
                                  <strong>${escapeHtml(participant.name)}</strong>
                                  <p class="muted">${escapeHtml(slotDetails.label)}</p>
                                </div>
                                <span class="mini-pill success">${escapeHtml(
                                  allocation.round + " / " + allocation.room,
                                )}</span>
                              </div>
                              <div class="field-grid three">
                                <label>
                                  Speaker Score
                                  <input type="number" min="0" step="any" name="${escapeHtml(
                                    getJudgeScoreFieldName(participant.id, "Speaker Score"),
                                  )}" value="${escapeHtml(
                                    existing?.speakerScore ?? getFeedbackSpeakerScore(existing) ?? "",
                                  )}" required />
                                </label>
                                ${feedbackCategories
                                  .map(
                                    (category) => `
                                      <label>
                                        ${escapeHtml(category)}
                                        <input type="number" min="0" step="any" name="${escapeHtml(
                                          getJudgeScoreFieldName(participant.id, category),
                                        )}" value="${escapeHtml(
                                          existing?.scores?.[category] ?? "",
                                        )}" placeholder="Optional" />
                                      </label>
                                    `,
                                  )
                                  .join("")}
                              </div>
                              ${
                                optionalScoreConfig.hasOptionalScores
                                  ? `
                                    <div class="field-grid three">
                                      ${
                                        optionalScoreConfig.crossExaminationEnabled
                                          ? `
                                            <label>
                                              Cross-Ex Questions
                                              <input type="number" min="0" max="20" step="any" name="${escapeHtml(
                                                getJudgeCrossQuestionFieldName(participant.id),
                                              )}" value="${escapeHtml(
                                                existing?.scores?.["Cross Examination Questions"] ?? "",
                                              )}" placeholder="Optional" />
                                            </label>
                                            <label>
                                              Cross-Ex Responses
                                              <input type="number" min="0" max="40" step="any" name="${escapeHtml(
                                                getJudgeCrossResponseFieldName(participant.id),
                                              )}" value="${escapeHtml(
                                                existing?.scores?.["Cross Examination Responses"] ?? "",
                                              )}" placeholder="Optional" />
                                            </label>
                                          `
                                          : ""
                                      }
                                      ${
                                        optionalScoreConfig.rebuttalEnabled
                                          ? `
                                            <label>
                                              Rebuttal
                                              <input type="number" min="0" max="50" step="any" name="${escapeHtml(
                                                getJudgeRebuttalFieldName(participant.id),
                                              )}" value="${escapeHtml(
                                                existing?.scores?.Rebuttal ?? "",
                                              )}" placeholder="Optional" />
                                            </label>
                                          `
                                          : ""
                                      }
                                    </div>
                                  `
                                  : ""
                              }
                              <label>
                                Optional Feedback
                                <textarea name="${escapeHtml(
                                  getJudgeNoteFieldName(participant.id),
                                )}" rows="3" placeholder="Optional adjudication feedback">${escapeHtml(
                                  existing?.note || "",
                                )}</textarea>
                              </label>
                            </section>
                          `;
                        })
                        .join("")}
                    </div>
                    <div class="button-row">
                      <button type="submit"><span>Submit Ballot</span></button>
                    </div>
                  </form>
                `
                  : `
                    <div class="alert info">
                      Only the assigned chair can submit the official ballot, speaker scores, and competitor feedback for this room.
                    </div>
                    <div class="flat-panel">
                      <strong>Assigned Speakers</strong>
                      <div class="leaderboard-list">
                        ${orderedParticipants
                          .map(
                            (participant) => {
                              const slotDetails = getParticipantDrawSlotDetails(
                                tournament,
                                drawEntry,
                                participant,
                              );
                              return `
                              <div class="leaderboard-row">
                                <div class="stack">
                                  <strong>${escapeHtml(participant.name)}</strong>
                                  <span class="muted">${escapeHtml(slotDetails.label)}</span>
                                </div>
                              </div>
                            `;
                            },
                          )
                          .join("")}
                      </div>
                      ${
                        officialChair
                          ? `<p class="fine-print">Official chair: ${escapeHtml(
                              officialChairJudge
                                ? getJudgeDisplayLabel(officialChairJudge)
                                : officialChair.judgeEmail,
                            )}</p>`
                          : `<p class="fine-print">No chair has been assigned to this room yet.</p>`
                      }
                    </div>
                  `
                : `<div class="empty-state">This room does not yet have rostered participants attached. Rebuild or re-save the draw from the tournament tab room.</div>`
            }
          </article>
        `;
      }

      function renderJudgingView() {
        const assignments = getJudgeAssignments();

        return `
          <section class="surface">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Judging</p>
                <h2>Your assigned ballots</h2>
              </div>
              <span class="role-pill">${escapeHtml(assignments.length)} rooms</span>
            </div>
            <div class="alert info">
              You only see rooms explicitly assigned to your email. Check in from your room card when you arrive. Only the assigned chair can submit the official ballot that updates standings, speaker rankings, and competitor feedback, and once it is submitted only tournament managers can reopen it.
            </div>
          </section>
          <section class="judge-grid">
            ${
              assignments.length
                ? assignments.map((assignment) => renderJudgeAssignmentCard(assignment)).join("")
                : `<section class="surface"><div class="empty-state">No judging assignments have been allocated to this account yet.</div></section>`
            }
          </section>
        `;
      }

      function renderSettingsView() {
        const settingsLocked = !canAccessGlobalSettings();
        const settings = state.appSettings;
        const currentUser = getCurrentUser();
        const devicePasswordSavingSupported = supportsDevicePasswordSaving();
        const devicePasswordSavingEnabled =
          normalizeEmail(authPrefs?.rememberedEmail) === normalizeEmail(currentUser?.email) &&
          authPrefs?.savePasswordOnDevice !== false;
        return `
          <section class="surface">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Settings</p>
                <h2>Configure the app, your workspace, and default behaviour</h2>
              </div>
              <span class="role-pill">${escapeHtml(
                settingsLocked ? "System Managers" : "System Manager Access",
              )}</span>
            </div>
            ${
              settingsLocked
                ? `<div class="alert warning">Only System Managers can change global settings. Your personal workspace settings below are still editable.</div>`
                : ""
            }
          </section>
          <section class="surface">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Personal Workspace</p>
                <h2>Make the platform feel like yours</h2>
              </div>
              <span class="role-pill">${escapeHtml(
                THEME_PRESETS[currentUser?.themePreset || "jade_classic"]?.label || "Customised",
              )}</span>
            </div>
            <form class="stack" data-form="update-user-preferences">
              <div class="field-grid two">
                <label>
                  Theme preset
                  <select name="themePreset">${getThemeOptionsMarkup(
                    currentUser?.themePreset || "jade_classic",
                  )}</select>
                </label>
                <label>
                  Start page after login
                  <select name="preferredLandingView">${getLandingViewOptionsMarkup(
                    currentUser?.preferredLandingView || "overview",
                  )}</select>
                </label>
              </div>
              ${renderThemeQuickSwitch(currentUser?.themePreset || "jade_classic")}
              ${renderThemePresetGallery(currentUser?.themePreset || "jade_classic")}
              <div class="alert info">
                Theme presets are personal to your account, so each user can keep a different look and starting workflow. You can either save the dropdown choice or tap any preview card above for an instant switch.
              </div>
              <button type="submit">Save personal settings</button>
            </form>
          </section>
          <section class="surface">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Password and Device Access</p>
                <h2>Save your password from inside JADE</h2>
              </div>
              <span class="role-pill">${escapeHtml(
                devicePasswordSavingEnabled ? "Enabled" : "Not saved",
              )}</span>
            </div>
            <form class="stack" data-form="update-device-password-preference" autocomplete="on">
              <label>
                Current password
                <input
                  type="password"
                  name="currentPassword"
                  placeholder="Enter your current password"
                  autocomplete="current-password"
                  ${devicePasswordSavingSupported ? "" : "disabled"}
                />
              </label>
              <label class="checkbox-row">
                <input
                  type="checkbox"
                  name="savePasswordOnDevice"
                  ${checked(devicePasswordSavingEnabled || authPrefs?.savePasswordOnDevice !== false)}
                  ${devicePasswordSavingSupported ? "" : "disabled"}
                />
                <span>Save Password Securely On This Device</span>
              </label>
              <div class="alert info">
                This in-app control uses your browser or device password manager when supported, so JADE still does not store your raw password in local app data.
              </div>
              ${
                devicePasswordSavingSupported
                  ? `<p class="auth-footer">Enter your current password to save or refresh the secure device copy. If you switch this off, JADE stops remembering the preference for this account on this device.</p>`
                  : `<div class="alert warning">This browser does not support secure device password saving through the app.</div>`
              }
              <button type="submit" ${devicePasswordSavingSupported ? "" : "disabled"}>${
                devicePasswordSavingEnabled
                  ? "Update Device Password Saving"
                  : "Save Password On This Device"
              }</button>
            </form>
          </section>
          <section class="tournament-grid">
            <section class="surface">
              <div class="section-heading">
                <h3>Branding and menu</h3>
              </div>
              <form class="stack" data-form="update-branding">
                <label>
                  App name
                  <input type="text" name="appName" value="${escapeHtml(
                    settings.branding.appName,
                  )}" ${settingsLocked ? "disabled" : ""} required />
                </label>
                <label>
                  Subtitle
                  <textarea name="subtitle" rows="3" ${settingsLocked ? "disabled" : ""}>${escapeHtml(
                    settings.branding.subtitle,
                  )}</textarea>
                </label>
                <div class="field-grid two">
                  <label>
                    Accent colour
                    <input type="text" name="accent" value="${escapeHtml(
                      settings.branding.accent,
                    )}" ${settingsLocked ? "disabled" : ""} required />
                  </label>
                  <label>
                    Accent deep colour
                    <input type="text" name="accentDeep" value="${escapeHtml(
                      settings.branding.accentDeep,
                    )}" ${settingsLocked ? "disabled" : ""} required />
                  </label>
                </div>
                <button type="submit" ${settingsLocked ? "disabled" : ""}>Save branding</button>
              </form>
            </section>

            <section class="surface">
              <div class="section-heading">
                <h3>Authentication and access</h3>
              </div>
              <form class="stack" data-form="update-security">
                <label>
                  Minimum password length
                  <input type="number" min="10" max="64" name="minimumPasswordLength" value="${escapeHtml(
                    settings.auth.minimumPasswordLength,
                  )}" ${settingsLocked ? "disabled" : ""} required />
                </label>
                <label class="checkbox-row">
                  <input type="checkbox" name="allowSelfSignup" ${checked(
                    settings.auth.allowSelfSignup,
                  )} ${settingsLocked ? "disabled" : ""} />
                  <span>Allow self sign-up</span>
                </label>
                <label class="checkbox-row">
                  <input type="checkbox" name="allowPasswordResetRequests" ${checked(
                    settings.auth.allowPasswordResetRequests,
                  )} ${settingsLocked ? "disabled" : ""} />
                  <span>Allow forgot-password requests</span>
                </label>
                <button type="submit" ${settingsLocked ? "disabled" : ""}>Save security settings</button>
              </form>
            </section>

            <section class="surface">
              <div class="section-heading">
                <h3>Portal defaults</h3>
              </div>
              <form class="stack" data-form="update-portal">
                <label class="checkbox-row">
                  <input type="checkbox" name="showStandingsInPrivatePortal" ${checked(
                    settings.portal.showStandingsInPrivatePortal,
                  )} ${settingsLocked ? "disabled" : ""} />
                  <span>Show standings in private portal when public standings are hidden</span>
                </label>
                <label class="checkbox-row">
                  <input type="checkbox" name="showDrawInPrivatePortal" ${checked(
                    settings.portal.showDrawInPrivatePortal,
                  )} ${settingsLocked ? "disabled" : ""} />
                  <span>Show draw in private portal</span>
                </label>
                <label class="checkbox-row">
                  <input type="checkbox" name="showFeedbackInPrivatePortal" ${checked(
                    settings.portal.showFeedbackInPrivatePortal,
                  )} ${settingsLocked ? "disabled" : ""} />
                  <span>Show judge feedback in private portal</span>
                </label>
                <label class="checkbox-row">
                  <input type="checkbox" name="compactLayout" ${checked(
                    settings.portal.compactLayout,
                  )} ${settingsLocked ? "disabled" : ""} />
                  <span>Use the compact private portal layout</span>
                </label>
                <label class="checkbox-row">
                  <input type="checkbox" name="showOnlyLatestFeedback" ${checked(
                    settings.portal.showOnlyLatestFeedback,
                  )} ${settingsLocked ? "disabled" : ""} />
                  <span>Show only the most recent feedback entry in the private portal</span>
                </label>
                <label>
                  Private portal welcome note
                  <textarea name="welcomeNote" rows="3" ${settingsLocked ? "disabled" : ""}>${escapeHtml(
                    settings.portal.welcomeNote,
                  )}</textarea>
                </label>
                <label>
                  Private link email template
                  <textarea name="emailTemplate" rows="4" ${settingsLocked ? "disabled" : ""}>${escapeHtml(
                    settings.portal.emailTemplate,
                  )}</textarea>
                </label>
                <label class="checkbox-row">
                  <input type="checkbox" name="commentRequired" ${checked(
                    settings.feedback.commentRequired,
                  )} ${settingsLocked ? "disabled" : ""} />
                  <span>Require written comment with feedback</span>
                </label>
                <button type="submit" ${settingsLocked ? "disabled" : ""}>Save portal defaults</button>
              </form>
            </section>

            <section class="surface">
              <div class="section-heading">
                <h3>Data and cloud</h3>
              </div>
              <div class="stack">
                <div class="alert info">${
                  cloudRuntime.available
                    ? cloudRuntime.initialized
                      ? "Shared cloud workspace is connected."
                      : "Cloud mode is available, but this workspace has not been initialized yet."
                    : "This deployment is currently running in local-only mode."
                }</div>
                <p class="fine-print">
                  Export a JSON backup from your original JADE setup before migrating to a live shared website.
                </p>
                <div class="button-row wrap-row">
                  <button class="secondary-button" type="button" data-action="export-data" ${
                    settingsLocked ? "disabled" : ""
                  }>Download Full Backup</button>
                </div>
              </div>
            </section>
          </section>
        `;
      }

      function renderWorkspaceSearchBar() {
        return `
          <form class="workspace-search-form compact-top-search" data-form="workspace-search">
            <label class="workspace-search-field">
              Search The Workspace
              <input type="search" name="query" value="${escapeHtml(
                session.searchQuery,
              )}" list="workspace-top-suggestions" autocomplete="off" placeholder="Search tournaments, participants, teams, institutions, or accounts" />
            </label>
            <div class="button-row wrap-row">
              <button type="submit">Search</button>
              ${
                session.searchQuery
                  ? `<button class="secondary-button" type="button" data-action="clear-workspace-search">Clear</button>`
                  : ""
              }
            </div>
          </form>
          ${renderSearchAssist(session.searchQuery, "workspace-top-suggestions")}
        `;
      }

      function renderWorkspace() {
        const capabilities = getWorkspaceCapabilities();
        if (capabilities.competitorOnly) {
          return renderCompetitorWorkspace();
        }

        const currentView = normalizeWorkspaceView();
        if (session.view !== currentView) {
          session.view = currentView;
        }

        const navItems = getWorkspaceNavItems();
        const currentNavItem =
          navItems.find((item) => item.key === currentView) || navItems[0] || {
            key: "overview",
            label: "Workspace",
          };

        const viewMarkup =
          currentView === "overview"
            ? renderOverviewView()
            : currentView === "tournaments"
              ? renderTournamentsView()
            : currentView === "search"
              ? renderSearchView()
            : currentView === "judging"
              ? renderJudgingView()
            : currentView === "people"
                ? renderPeopleView()
              : currentView === "links"
                  ? renderLinksView()
                : currentView === "about"
                  ? renderAboutView(false)
                  : renderSettingsView();

        return `
          <div class="page-shell">
            <div class="workspace-shell">
              ${renderMenu()}
              <section class="content-panel">
                <div class="workspace-topbar surface">
                  ${renderBrandLockup({
                    kicker: "JADE Workspace",
                    size: "compact",
                    subtitle:
                      capabilities.canManageAny
                        ? "A refined staff workspace for tournament control, permissions, judging, and publishing."
                        : capabilities.canJudgeAny
                          ? "A focused workspace for judging assignments, tournament details, and private access."
                          : "A streamlined workspace for public tournament tracking and private access.",
                  })}
                  <div class="topbar">
                    <div>
                      <p class="eyebrow">${escapeHtml(currentNavItem.label)}</p>
                      <h1>${escapeHtml(currentNavItem.label)}</h1>
                      <p class="workspace-view-note">${escapeHtml(
                        getWorkspaceViewSupportText(currentNavItem.key, session.userEmail),
                      )}</p>
                    </div>
                  </div>
                  ${renderWorkspaceStatusBand(currentNavItem, session.userEmail)}
                  ${renderWorkspaceSearchBar()}
                </div>
                ${renderFlash()}
                ${viewMarkup}
              </section>
            </div>
          </div>
        `;
      }

      function findPrivateAccess(token) {
        for (const tournament of state.tournaments) {
          for (const participant of tournament.participants) {
            if (participant.token === token) {
              return { tournament, participant };
            }
          }
        }
        return null;
      }

      function renderPortalFeedbackCards(feedbackEntries) {
        if (!feedbackEntries.length) {
          return `<div class="empty-state">No feedback has been posted for your entry yet.</div>`;
        }

        return feedbackEntries
          .map(
            (entry) => `

          document.querySelector("#app").innerHTML =
            '<div class="page-shell"><section class="surface"><h2>Loading JADE Debate Tab...</h2></section></div>';
          return;
        }

        applyBranding();
        const token = new URL(window.location.href).searchParams.get("token");
        const appMarkup = token
          ? renderPrivatePortal(token)
          : getCurrentUser()
            ? renderWorkspace()
            : session.view === "about"
              ? renderAboutView(true)
              : renderAuthView();
        document.querySelector("#app").innerHTML = appMarkup + renderConfirmationDialog();
        if (pendingTournamentSectionJumpId) {
          const targetId = pendingTournamentSectionJumpId;
          pendingTournamentSectionJumpId = "";
          window.requestAnimationFrame(() => {
            window.requestAnimationFrame(() => {
              jumpToTournamentSection(targetId);
            });
          });
        }
      }

      async function signIn(formData) {
        const email = normalizeEmail(formData.get("email"));
        const password = String(formData.get("password") || "");
        const savePasswordOnDevice = boolFromForm(formData, "savePasswordOnDevice");
        const cloudAvailable = await probeCloudBackend();

        if (cloudAvailable) {
          try {
            const result = await callCloud("sign_in", {
              email,
              password,
            });
            cloudRuntime.initialized = true;
            state = await rehydrateState(result.state);
            session.userEmail = email;
            session.cloudSessionToken = String(result.sessionToken || "").trim();
            session.view = getPreferredLandingView(email);
            session.managedTournamentId = "";
            session.selectedTournamentId = "";
            recordRecentView(session.view);
            updateAuthPrefsAfterCredentialChoice(email, savePasswordOnDevice);
            clearFlash();
            saveState();
            saveSession();
            const currentUser = getCurrentUser();
            if (savePasswordOnDevice) {
              await savePasswordToDeviceVault(email, password);
              await saveBrowserCredential(currentUser?.name || email, email, password);
            } else {
              removePasswordFromDeviceVault(email);
            }
            renderApp();
            return;
          } catch (error) {
            if (error.code === "workspace_not_initialized") {
              const localUser = state.users.find((entry) => entry.email === email);
              if (!localUser) {
                setFlash(
                  "error",
                  "The shared cloud workspace has not been initialized yet. Sign in once from the original manager device to publish the current workspace.",
                );
                renderApp();
                return;
              }

              if (!localUser.active) {
                setFlash("error", "This account has been disabled by the manager.");
                renderApp();
                return;
              }

              const localPasswordCheck = await verifyUserPassword(localUser, password);
              if (!localPasswordCheck.ok) {
                setFlash("error", "Incorrect password.");
                renderApp();
                return;
              }

              if (!isSystemAdmin(email)) {
                setFlash(
                  "error",
                  "A System Manager must initialize the shared cloud workspace from the original setup device first.",
                );
                renderApp();
                return;
              }

              if (localPasswordCheck.needsUpgrade) {
                Object.assign(localUser, await buildSecurePasswordRecord(password));
              }

              try {
                const result = await callCloud("initialize", {
                  email,
                  password,
                  state,
                });
                cloudRuntime.initialized = true;
                state = await rehydrateState(result.state);
                session.userEmail = email;
                session.cloudSessionToken = String(result.sessionToken || "").trim();
                session.view = getPreferredLandingView(email);
                session.managedTournamentId = "";
                session.selectedTournamentId = "";
                recordRecentView(session.view);
                updateAuthPrefsAfterCredentialChoice(email, savePasswordOnDevice);
                clearFlash();
                saveState();
                saveSession();
                const currentUser = getCurrentUser();
                if (savePasswordOnDevice) {
                  await savePasswordToDeviceVault(email, password);
                  await saveBrowserCredential(currentUser?.name || email, email, password);
                } else {
                  removePasswordFromDeviceVault(email);
                }
                setFlash(
                  "success",
                  "Cloud workspace initialized. JADE is now sharing this workspace across devices.",
                );
                renderApp();
                return;
              } catch (initError) {
                setFlash("error", initError.message || "JADE could not initialize cloud sync.");
                renderApp();
                return;
              }
            }

            setFlash("error", error.message || "JADE could not sign you in.");
            renderApp();
            return;
          }
        }

        const user = state.users.find((entry) => entry.email === email);

        if (!user) {
          setFlash("error", "No account exists for that email address.");
          renderApp();
          return;
        }

        if (!user.active) {
          setFlash("error", "This account has been disabled by the manager.");
          renderApp();
          return;
        }

        const passwordCheck = await verifyUserPassword(user, password);
        if (!passwordCheck.ok) {
          setFlash("error", "Incorrect password.");
          renderApp();
          return;
        }

        if (passwordCheck.needsUpgrade) {
          Object.assign(user, await buildSecurePasswordRecord(password));
        }

        user.lastLoginAt = timestamp();
        session.userEmail = email;
        session.cloudSessionToken = "";
        session.view = getPreferredLandingView(email);
        session.managedTournamentId = "";
        session.selectedTournamentId = "";
        recordRecentView(session.view);
        updateAuthPrefsAfterCredentialChoice(email, savePasswordOnDevice);
        clearFlash();
        saveState();
        saveSession();
        if (savePasswordOnDevice) {
          await savePasswordToDeviceVault(email, password);
          await saveBrowserCredential(user.name, email, password);
        } else {
          removePasswordFromDeviceVault(email);
        }
        renderApp();
      }

      async function signUp(formData) {
        if (!state.appSettings.auth.allowSelfSignup) {
          setFlash("error", "Self sign-up is currently disabled.");
          renderApp();
          return;
        }

        const name = String(formData.get("name") || "").trim();
        const email = normalizeEmail(formData.get("email"));
        const password = String(formData.get("password") || "");
        const confirmPassword = String(formData.get("confirmPassword") || "");
        const savePasswordOnDevice = boolFromForm(formData, "savePasswordOnDevice");

        if (!name || !email) {
          setFlash("error", "Name and email are required.");
          renderApp();
          return;
        }

        if (password.length < state.appSettings.auth.minimumPasswordLength) {
          setFlash(
            "error",
            "Password must be at least " +
              state.appSettings.auth.minimumPasswordLength +
              " characters long.",
          );
          renderApp();
          return;
        }

        if (password !== confirmPassword) {
          setFlash("error", "Passwords do not match.");
          renderApp();
          return;
        }

        if (state.users.some((user) => user.email === email)) {
          setFlash("error", "An account with that email already exists.");
          renderApp();
          return;
        }

        if (await probeCloudBackend()) {
          try {
            const result = await callCloud("sign_up", {
              name,
              email,
              password,
            });
            cloudRuntime.initialized = true;
            state = await rehydrateState(result.state);
            session.userEmail = email;
            session.cloudSessionToken = String(result.sessionToken || "").trim();
            session.view = getPreferredLandingView(email);
            session.managedTournamentId = "";
            session.selectedTournamentId = "";
            recordRecentView(session.view);
            updateAuthPrefsAfterCredentialChoice(email, savePasswordOnDevice);
            if (savePasswordOnDevice) {
              await savePasswordToDeviceVault(email, password);
              await saveBrowserCredential(name, email, password);
            } else {
              removePasswordFromDeviceVault(email);
            }
            clearFlash();
            saveState();
            saveSession();
            setFlash("success", "Account created and signed in. Your private access URL is now ready.");
            renderApp();
            return;
          } catch (error) {
            if (error.code === "workspace_not_initialized") {
              setFlash(
                "error",
                "The shared cloud workspace has not been initialized yet. A System Manager should sign in from the original setup device first.",
              );
            } else {
              setFlash("error", error.message || "JADE could not create your account.");
            }
            renderApp();
            return;
          }
        }

        const user = await buildUser(name, email, "member", password, {
          createdSource: "self_signup",
          createdBy: normalizeEmail(email),
        });
        user.lastLoginAt = timestamp();
        state.users.push(user);
        session.userEmail = email;
        session.cloudSessionToken = "";
        session.view = getPreferredLandingView(email);
        session.managedTournamentId = "";
        session.selectedTournamentId = "";
        recordRecentView(session.view);

        updateAuthPrefsAfterCredentialChoice(email, savePasswordOnDevice);
        if (savePasswordOnDevice) {
          await savePasswordToDeviceVault(email, password);
          await saveBrowserCredential(name, email, password);
        } else {
          removePasswordFromDeviceVault(email);
        }
        persist("success", "Account created and signed in. Your private access URL is now ready.");
      }

      async function initializeCloudFromBackup(formData) {
        if (!(await probeCloudBackend())) {
          setFlash("error", "JADE cloud setup is not available on this deployment yet.");
          renderApp();
          return;
        }

        if (cloudRuntime.initialized) {
          setFlash("error", "The shared cloud workspace has already been initialized.");
          renderApp();
          return;
        }

        const email = normalizeEmail(formData.get("email"));
        const password = String(formData.get("password") || "");
        const backupFile = formData.get("backupFile");

        if (!email || !password) {
          setFlash("error", "Manager email and password are required.");
          renderApp();
          return;
        }

        if (!(backupFile instanceof File) || !backupFile.size) {
          setFlash("error", "Choose a JADE backup JSON file first.");
          renderApp();
          return;
        }

        try {
          const parsed = JSON.parse(await backupFile.text());
          const normalizedBackup = await rehydrateState(parsed);
          const result = await callCloud("initialize", {
            email,
            password,
            state: normalizedBackup,
          });

          cloudRuntime.initialized = true;
          state = await rehydrateState(result.state);
          session.userEmail = email;
          session.cloudSessionToken = String(result.sessionToken || "").trim();
          session.view = getPreferredLandingView(email);
          session.managedTournamentId = "";
          session.selectedTournamentId = "";
          recordRecentView(session.view);
          clearFlash();
          saveState();
          saveSession();
          setFlash(
            "success",
            "Cloud workspace initialized from your backup. JADE is now ready to share data across devices.",
          );
          renderApp();
        } catch (error) {
          setFlash(
            "error",
            error.message || "JADE could not initialize the cloud workspace from that backup.",
          );
          renderApp();
        }
      }

      function submitPasswordResetRequest(formData) {
        if (!state.appSettings.auth.allowPasswordResetRequests) {
          setFlash("error", "Password reset requests are currently disabled.");
          renderApp();
          return;
        }

        const email = normalizeEmail(formData.get("email"));
        const note = String(formData.get("note") || "").trim();

        if (!email) {
          setFlash("error", "Enter your email address to request a password reset.");
          renderApp();
          return;
        }

        if (cloudRuntime.available) {
          callCloud("request_password_reset", {
            email,
            note,
          })
            .then(() => {
              setFlash(
                "success",
                "If an account exists for that email address, the password reset request has been logged for the manager.",
              );
              renderApp();
            })
            .catch((error) => {
              setFlash(
                "error",
                error.message || "JADE could not submit the password reset request right now.",
              );
              renderApp();
            });
          return;
        }

        const existing = (state.recoveryRequests || []).find(
          (request) => request.email === email && request.status === "open",
        );
        const knownAccount = state.users.some((user) => user.email === email);
        const submittedAt = timestamp();
        const submittedAtKey = Date.now();

        if (existing) {
          existing.note = note || existing.note;
          existing.knownAccount = knownAccount;
          existing.submittedAt = submittedAt;
          existing.submittedAtKey = submittedAtKey;
        } else {
          state.recoveryRequests.unshift({
            id: createId("recovery"),
            email,
            note,
            knownAccount,
            submittedAt,
            submittedAtKey,
            status: "open",
            resolvedAt: "",
            resolvedBy: "",
          });
        }

        persist(
          "success",
          "If an account exists for that email address, the password reset request has been logged for the manager.",
        );
      }

      async function setUserPasswordInternal(targetEmail, password) {
        const email = normalizeEmail(targetEmail);
        if (!email) {
          return { ok: false, message: "Select an account before setting a password." };
        }

        if (email === normalizeEmail(MANAGER_EMAIL)) {
          return {
            ok: false,
            message: "The manager password is fixed in the seeded demo account.",
          };
        }

        if (String(password || "").length < state.appSettings.auth.minimumPasswordLength) {
          return {
            ok: false,
            message:
              "Passwords must be at least " +
              state.appSettings.auth.minimumPasswordLength +
              " characters long.",
          };
        }

        let found = false;
        const passwordRecord = await buildSecurePasswordRecord(password);
        state.users = state.users.map((user) => {
          if (user.email !== email) {
            return user;
          }
          found = true;
          return {
            ...user,
            ...passwordRecord,
          };
        });

        if (!found) {
          return { ok: false, message: "The selected account was not found." };
        }

        return { ok: true, email };
      }

                resolvedBy: normalizeEmail(session.userEmail),

            const manualTeamName = String(formData.get("teamName") || "").trim();

      function addTeam(tournamentId, formData) {
        const tournament = ensureTournamentManagerById(tournamentId);
        if (!tournament) return;

        const name = String(formData.get("name") || "").trim();
        const institution = String(formData.get("institution") || "").trim();
        const notes = String(formData.get("notes") || "").trim();
        if (!name) {
          setFlash("error", "Enter a team name before saving the team.");
          renderApp();
          return;
        }

        const candidateTeam = createTeamRecord(name, institution, {
          publicAlias: String(formData.get("publicAlias") || "").trim(),
          notes,
          source: "manual",
        });
        if (getTournamentTeams(tournament).some((team) => teamsLookEquivalent(team, candidateTeam))) {
          setFlash("error", "That team already exists in this tournament.");
          renderApp();
          return;
        }

        updateTournament(
          tournamentId,
          (nextTournament) => {
            nextTournament.teams.push(candidateTeam);
            synchronizeTournamentTeamReferences(nextTournament);
            return addAudit(
              nextTournament,
              "Added team " + (institution ? institution + " " : "") + name + ".",
            );
          },
          "Team added.",
        );
      }

      function synchronizeTournamentTeamReferences(tournament) {
        tournament.teams = normalizeTeamsForTournament(tournament.teams, tournament);
        const teams = getTournamentTeams(tournament);
        const teamById = new Map(teams.map((team) => [team.id, team]));

        tournament.participants = (tournament.participants || []).map((participant) => {
          const normalized = normalizeParticipantRecord(participant);
          const teamReference = normalizeTeamRecord({
            id: normalized.teamId || "",
            name: normalized.teamName || "",
            institution: normalized.institution || "",
          });
          const linkedTeam =
            (normalized.teamId && teamById.get(normalized.teamId)) ||
            teams.find((team) => teamsLookEquivalent(team, teamReference)) ||
            null;
          if (!linkedTeam) {
            return normalized;
          }
          return {
            ...normalized,
            teamId: linkedTeam.id,
            teamName: linkedTeam.name,
            institution: normalized.institution || linkedTeam.institution,
          };
        });

        tournament.draw = (tournament.draw || []).map((drawEntry) => {
          const nextSlots = (drawEntry.slots || []).map((slot) => {
            const slotReference = normalizeTeamRecord({
              id: slot.teamId || "",
              name: slot.teamName || slot.shortLabel || slot.label || "",
              institution: slot.institution || "",
              publicAlias: slot.publicAlias || "",
            });
            const linkedTeam =
              (slot.teamId && teamById.get(slot.teamId)) ||
              teams.find((team) => teamsLookEquivalent(team, slotReference)) ||
              null;

            if (linkedTeam) {
              return {
                ...slot,
                teamId: linkedTeam.id,
                teamName: linkedTeam.name,
                publicAlias: linkedTeam.publicAlias || "",
                shortLabel: linkedTeam.name,
                label: getTeamDisplayLabel(linkedTeam),
                institution: linkedTeam.institution,
              };
            }

            if (slot.type === "speaker") {
              const participant = (tournament.participants || []).find(
                (entry) => entry.id === slot.entryId,
              );
              if (participant) {
                return {
                  ...slot,
                  label: participant.institution
                    ? participant.institution + " " + participant.name
                    : participant.name,
                  shortLabel: participant.name,
                  institution: participant.institution,
                };
              }
            }

            return slot;
          });

          return createDrawRecord(tournament, {
            ...drawEntry,
            slots: nextSlots,
          });
        });

        return tournament;
      }

      function updateTeam(tournamentId, teamId, formData) {

        updateTournament(

              return createTeamRecord(

                  publicAlias: String(formData.get("publicAlias") || "").trim(),
                  notes: String(formData.get("notes") || "").trim(),
                  createdAt: team.createdAt,
                },
              );
            });
            if (!updatedExisting) {
              tournament.teams.push(
                createTeamRecord(
                  String(formData.get("name") || "").trim(),
                  String(formData.get("institution") || "").trim(),
                  {
                    id: teamId,
                    publicAlias: String(formData.get("publicAlias") || "").trim(),
                    notes: String(formData.get("notes") || "").trim(),
                  },
                ),
              );
            }
            synchronizeTournamentTeamReferences(tournament);
            const updatedTeam = (tournament.teams || []).find((team) => team.id === teamId);
            return addAudit(
              tournament,
              "Updated team details for " +
                (updatedTeam ? getTeamDisplayLabel(updatedTeam) : "team " + teamId) +
                ".",

          "Team details saved.",

      function addJudge(tournamentId, formData) {

        updateTournament(
          tournamentId,
          (tournament) => {

              const existingJudge = (tournament.judges || []).find(
                (judge) => judge.email === email,
              );
            if (!email) {
              return tournament;
            }

            const judge = createJudgeRecord(
              String(formData.get("name") || "").trim(),
              email,
              String(formData.get("institution") || "").trim(),
              {
                panelQuality: String(formData.get("panelQuality") || "wing").trim(),
                qualityTier: String(formData.get("qualityTier") || "solid").trim(),
                notes: String(formData.get("notes") || "").trim(),
              },

            tournament.judges = existingJudge
              ? (tournament.judges || []).map((entry) =>
                  normalizeEmail(entry.email) === email ? { ...entry, ...judge } : entry,
                )
              : [...(tournament.judges || []), judge];
            tournament.permissions.judgeEmails = Array.from(
              new Set([...(tournament.permissions.judgeEmails || []), judge.email]),
            );
            return addAudit(
              tournament,
              (existingJudge ? "Updated judge " : "Added judge ") +
                getJudgeDisplayLabel(judge) +
                " as " +
                getJudgePanelQualityLabel(judge.panelQuality) +
                " / " +
                getJudgeQualityTierLabel(judge.qualityTier) +

      function assignJudgeAllocation(tournamentId, formData) {
        const tournament = ensureTournamentManagerById(tournamentId);
        if (!tournament) return;

        const drawId = String(formData.get("drawId") || "").trim();
        const judgeEmail = normalizeEmail(formData.get("judgeEmail"));
        const requestedRole = normalizeJudgeAllocationRole(
          String(formData.get("panelRole") || "auto").trim(),
          "",
        );
        if (!drawId || !judgeEmail) {
          setFlash("error", "Choose both a judge and a saved room.");
          renderApp();
          return;
        }

        const drawEntry = getDrawEntryById(tournament, drawId);
        if (!drawEntry) {
          setFlash("error", "That saved room could not be found.");
          renderApp();
          return;
        }

        const existing = getJudgeAllocationsForTournament(tournament).find(
          (allocation) =>
            allocation.drawId === drawId &&
            normalizeEmail(allocation.judgeEmail) === judgeEmail,
        );
        const composition = getRoomJudgeComposition(tournament, drawId, existing?.id || "");
        const judgeRecord = getJudgeByEmail(tournament, judgeEmail);
        const resolvedRole =
          requestedRole ||
          (!composition.chairCount &&
          normalizeJudgePanelQuality(judgeRecord?.panelQuality) === "chair"
            ? "chair"
            : "panelist");
        const conflictingChair = getChairAllocationForDrawEntry(
          tournament,
          drawId,
          existing?.id || "",
        );
        const otherRoundAllocation = getJudgeAllocationForRound(
          tournament,
          judgeEmail,
          drawEntry.round,
          existing?.id || "",
        );

        if (!judgeRecord) {
          setFlash("error", "That judge is not on the tournament roster.");
          renderApp();
          return;
        }

        if (
          resolvedRole === "chair" &&
          normalizeJudgePanelQuality(judgeRecord.panelQuality) !== "chair"
        ) {
          setFlash("error", "Only chair-quality judges can be assigned as the chair.");
          renderApp();
          return;
        }

        if (resolvedRole === "chair" && conflictingChair) {
          setFlash("error", "That room already has an assigned chair. Reassign or remove the current chair first.");
          renderApp();
          return;
        }

        if (resolvedRole === "panelist" && composition.panelCount >= 2) {
          setFlash("error", "That room already has two assigned panelists.");
          renderApp();
          return;
        }

        if (!existing && composition.total >= 3) {
          setFlash("error", "That room already has a full judging panel.");
          renderApp();
          return;
        }

        if (otherRoundAllocation) {
          setFlash(
            "error",
            "That judge is already allocated in Round " +
              drawEntry.round +
              " to " +
              otherRoundAllocation.room +
              ".",
          );
          renderApp();
          return;
        }

        updateTournament(
          tournamentId,
          (currentTournament) => {
            if (existing) {
              const updatedRole = normalizeJudgeAllocationRole(requestedRole, existing.panelRole);
              currentTournament.judgeAllocations = (currentTournament.judgeAllocations || []).map(
                (allocation) =>
                  allocation.id === existing.id
                    ? {
                        ...allocation,
                        panelRole: updatedRole,
                      }
                    : allocation,
              );
              return addAudit(
                currentTournament,
                "Updated judge " +
                  judgeEmail +
                  " on Round " +
                  drawEntry.round +
                  ", " +
                  drawEntry.room +
                  " to " +
                  getJudgeAllocationRoleLabel(updatedRole) +
                  ".",
              );
            }

            currentTournament.judgeAllocations = [
              ...(currentTournament.judgeAllocations || []),
              createJudgeAllocationRecord(currentTournament, drawEntry, judgeEmail, {
                panelRole: resolvedRole,
              }),
            ];
            return addAudit(
              currentTournament,
              "Assigned judge " +
                judgeEmail +
                " to Round " +
                drawEntry.round +
                ", " +
                drawEntry.room +
                " as " +
                getJudgeAllocationRoleLabel(resolvedRole) +
                ".",
            );
          },
          "Judge assigned to room.",
        );
      }

      function autoAllocateJudges(tournamentId, formData) {
        const tournament = ensureTournamentManagerById(tournamentId);
        if (!tournament) return;

        const round = normalizeRoundCount(formData.get("round"), 1);
        const judgesPerRoom = Math.min(
          3,
          Math.max(1, numberFromForm(formData, "judgesPerRoom", 1)),
        );
        const replaceExisting = boolFromForm(formData, "replaceExisting");
        const roundDraw = (tournament.draw || [])
          .filter((entry) => Number(entry.round) === Number(round))
          .sort(
            (left, right) =>
              Number(right.priority || 0) - Number(left.priority || 0) ||
              String(left.room || "").localeCompare(String(right.room || "")),
          );
        const judgeRoster = getTournamentJudges(tournament);

        if (!roundDraw.length) {
          setFlash("error", "Save rooms for that round before auto-allocating judges.");
          renderApp();
          return;
        }

        if (!judgeRoster.length) {
          setFlash("error", "Add judges to the tournament before auto-allocating rooms.");
          renderApp();
          return;
        }

        const rankedJudges = [...judgeRoster].sort(compareJudgesByQuality);
        const chairPool = rankedJudges.filter(
          (judge) => normalizeJudgePanelQuality(judge.panelQuality) === "chair",
        );
        const perRoom = Math.min(judgesPerRoom, rankedJudges.length);
        const preservedForRound = replaceExisting
          ? []
          : (tournament.judgeAllocations || []).filter(
              (allocation) => Number(allocation.round) === Number(round),
            );
        const roundUsedEmails = new Set(
          preservedForRound.map((allocation) => normalizeEmail(allocation.judgeEmail)),
        );
        let requiredChairs = 0;
        let requiredAssignments = 0;

        roundDraw.forEach((drawEntry) => {
          const roomAllocations = preservedForRound.filter(
            (allocation) => allocation.drawId === drawEntry.id,
          );
          const roomCount = Math.min(3, perRoom);
          const hasChair = roomAllocations.some(
            (allocation) =>
              normalizeJudgeAllocationRole(allocation.panelRole, "panelist") === "chair",
          );
          const total = roomAllocations.length;
          const roomAssignmentsNeeded = Math.max(0, roomCount - total);

          if (!hasChair && roomAssignmentsNeeded > 0) {
            requiredChairs += 1;
          }
          requiredAssignments += roomAssignmentsNeeded;
        });

        const availableJudgeCount = rankedJudges.filter(
          (judge) => !roundUsedEmails.has(normalizeEmail(judge.email)),
        ).length;
        const availableChairCount = chairPool.filter(
          (judge) => !roundUsedEmails.has(normalizeEmail(judge.email)),
        ).length;

        if (availableChairCount < requiredChairs) {
          setFlash(
            "error",
            "You need at least " +
              requiredChairs +
              " available chair-quality judge" +
              (requiredChairs === 1 ? "" : "s") +
              " to cover every room in that round.",
          );
          renderApp();
          return;
        }

        if (availableJudgeCount < requiredAssignments) {
          setFlash(
            "error",
            "You do not have enough available judges to fill " +
              perRoom +
              " spot" +
              (perRoom === 1 ? "" : "s") +
              " per room in that round.",
          );
          renderApp();
          return;
        }

        updateTournament(
          tournamentId,
          (currentTournament) => {
            const preserved = replaceExisting
              ? (currentTournament.judgeAllocations || []).filter(
                  (allocation) => Number(allocation.round) !== Number(round),
                )
              : [...(currentTournament.judgeAllocations || [])];
            const roundUsedJudgeEmails = new Set(
              preserved
                .filter((allocation) => Number(allocation.round) === Number(round))
                .map((allocation) => normalizeEmail(allocation.judgeEmail)),
            );
            const cursors = {
              all: 0,
              chairs: 0,
            };

            function takeJudge(queue, cursorKey, roomUsedEmails) {
              if (!queue.length) {
                return null;
              }

              for (let offset = 0; offset < queue.length; offset += 1) {
                const candidate = queue[(cursors[cursorKey] + offset) % queue.length];
                if (
                  !roomUsedEmails.has(candidate.email) &&
                  !roundUsedJudgeEmails.has(candidate.email)
                ) {
                  cursors[cursorKey] = (cursors[cursorKey] + offset + 1) % queue.length;
                  return candidate;
                }
              }

              return null;
            }

            roundDraw.forEach((drawEntry) => {
              const roomAllocations = preserved.filter(
                (allocation) => allocation.drawId === drawEntry.id,
              );
              const usedEmails = new Set(
                roomAllocations.map((allocation) => normalizeEmail(allocation.judgeEmail)),
              );
              const rolesToAdd = [];
              const hasChair = roomAllocations.some(
                (allocation) =>
                  normalizeJudgeAllocationRole(allocation.panelRole, "panelist") === "chair",
              );

              if (!hasChair && perRoom > 0 && roomAllocations.length < perRoom) {
                rolesToAdd.push("chair");
              }

              while (roomAllocations.length + rolesToAdd.length < perRoom) {
                rolesToAdd.push("panelist");
              }

              rolesToAdd.forEach((panelRole) => {
                const preferredPool = panelRole === "chair" ? chairPool : rankedJudges;
                const preferredKey = panelRole === "chair" ? "chairs" : "all";
                const judgeRecord =
                  takeJudge(preferredPool, preferredKey, usedEmails) ||
                  takeJudge(rankedJudges, "all", usedEmails);

                if (!judgeRecord) {
                  return;
                }

                const exists = preserved.some(
                  (allocation) =>
                    allocation.drawId === drawEntry.id &&
                    normalizeEmail(allocation.judgeEmail) === normalizeEmail(judgeRecord.email),
                );
                if (!exists) {
                  usedEmails.add(judgeRecord.email);
                  roundUsedJudgeEmails.add(judgeRecord.email);
                  preserved.push(
                    createJudgeAllocationRecord(currentTournament, drawEntry, judgeRecord.email, {
                      panelRole,
                    }),
                  );
                }
              });
            });

            currentTournament.judgeAllocations = preserved;
            return addAudit(
              currentTournament,
              "Auto-allocated judges for Round " +
                round +
                " with " +
                perRoom +
                " judge" +
                (perRoom === 1 ? "" : "s") +
                " per room using chair and panel quality.",
            );
          },
          "Judges auto-allocated.",
        );
      }

      function deleteJudgeAllocation(tournamentId, allocationId) {
        if (!ensureTournamentManagerById(tournamentId)) return;

        updateTournament(

      function reopenJudgeBallot(tournamentId, allocationId) {
        const tournament = ensureTournamentManagerById(tournamentId);
        if (!tournament) return;
        const allocation = (tournament.judgeAllocations || []).find(
          (entry) => entry.id === allocationId,
        );
        if (!allocation) {
          setFlash("error", "That judge allocation could not be found.");
          renderApp();
          return;
        }
        if (!allocation.submittedAt) {
          setFlash("error", "That ballot is not currently locked.");
          renderApp();
          return;
        }

        updateTournament(
          tournamentId,
          (tournament) => {
            const currentAllocation = (tournament.judgeAllocations || []).find(
              (entry) => entry.id === allocationId,
            );
            if (!currentAllocation) {
              return tournament;
            }

            tournament.participants = (tournament.participants || []).map((participant) => ({
              ...participant,
              feedback: (participant.feedback || []).filter(
                (entry) =>
                  !(
                    String(entry.allocationId || "") === String(allocationId || "") &&
                    normalizeEmail(entry.judgeEmail) === normalizeEmail(currentAllocation.judgeEmail)
                  ),
              ),
            }));

            tournament.judgeAllocations = (tournament.judgeAllocations || []).map((entry) =>
              entry.id === allocationId
                ? {
                    ...entry,
                    status: entry.checkedIn ? "checked_in" : "assigned",
                    submittedAt: "",
                    submittedAtKey: 0,
                  }
                : entry,
            );

            tournament.draw = (tournament.draw || []).map((drawEntry) =>
              drawEntry.id === currentAllocation.drawId
                ? {
                    ...drawEntry,
                    officialResults: {},
                    ballotCheckedIn: false,
                  }
                : drawEntry,
            );

            return addAudit(
              tournament,
              "Reopened the submitted ballot for Round " +
                currentAllocation.round +
                ", " +
                currentAllocation.room +
                ".",
            );
          },
          "Submitted ballot reopened.",
        );
      }

      function getDrawRoomStrengthScore(tournament, drawEntry) {
        const profile = getScoringProfile(tournament);
        return (drawEntry?.slots || []).reduce((sum, slot) => {
          const team =
            (slot.teamId && getTournamentTeams(tournament).find((entry) => entry.id === slot.teamId)) ||
            findTournamentTeamByName(tournament, slot.teamName || slot.shortLabel || slot.label) ||
            null;
          const standing = team ? getTeamStanding(tournament, team) : null;
          if (standing) {
            if (profile.mode === "bp_team") {
              return sum + Number(standing.points || 0) * 10 + Number(standing.firsts || 0) * 2;
            }
            return sum + Number(standing.points || 0) * 10 + Number(standing.wins || 0) * 4;
          }

          const participantScores = (Array.isArray(slot.participantIds) ? slot.participantIds : [])
            .map((participantId) =>
              getParticipantAverageSpeakerScoreForDraw(tournament, participantId, drawEntry.id),
            )
            .filter((value) => value !== null);
          return (
            sum +
            participantScores.reduce((scoreSum, value) => scoreSum + Number(value || 0), 0)
          );
        }, 0);
      }

      function getAutoPriorityValue(index, total, method = "power") {
        if (method === "random") {
          return 3;
        }
        if (total <= 1) {
          return 5;
        }
        const ratio = index / Math.max(1, total - 1);
        return Math.max(1, 5 - Math.floor(ratio * 4.999));
      }

      function autoPrioritizeRound(tournamentId, roundValue) {
        const tournament = ensureTournamentManagerById(tournamentId);
        if (!tournament) return;
        const round = normalizeRoundCount(roundValue, 1);

        if (!(tournament.draw || []).some((entry) => Number(entry.round) === Number(round))) {
          setFlash("error", "There are no saved rooms for that round yet.");
          renderApp();
          return;
        }

        updateTournament(
          tournamentId,
          (currentTournament) => {
            const ranked = (currentTournament.draw || [])
              .filter((entry) => Number(entry.round) === Number(round))
              .map((entry) => ({
                entry,
                score: getDrawRoomStrengthScore(currentTournament, entry),
              }))
              .sort(
                (left, right) =>
                  Number(right.score || 0) - Number(left.score || 0) ||
                  String(left.entry.room || "").localeCompare(String(right.entry.room || "")),
              );
            const priorityMap = new Map(
              ranked.map((item, index) => [
                item.entry.id,
                getAutoPriorityValue(index, ranked.length, "power"),
              ]),
            );

            currentTournament.draw = (currentTournament.draw || []).map((entry) =>
              Number(entry.round) === Number(round)
                ? {
                    ...entry,
                    priority: priorityMap.get(entry.id) || normalizeRoomPriority(entry.priority, 3),
                  }
                : entry,
            );
            return addAudit(
              currentTournament,
              "Auto-prioritised debates for Round " + round + ".",
            );
          },
          "Round priorities updated.",
        );
      }
