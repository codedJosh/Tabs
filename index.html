      function renderTournamentDrawBoard(tournament, options = {}) {
        const canManage = Boolean(options.canManage);
        const canSeeDraw = Boolean(options.canSeeDraw);
        if (!canSeeDraw && !canManage) {
          return `<div class="empty-state">The draw is not currently public for this tournament.</div>`;
        }

        const visibleDrawEntries = (canManage
          ? tournament.draw || []
          : (tournament.draw || []).filter(
              (entry) => String(entry.status || "").trim().toLowerCase() === "published",
            )
        )
          .slice()
          .sort(
            (left, right) =>
              Number(right.round || 0) - Number(left.round || 0) ||
              Number(right.priority || 0) - Number(left.priority || 0) ||
              String(left.room || "").localeCompare(String(right.room || "")),
          );

        if (!visibleDrawEntries.length) {
          return `<div class="empty-state">No draw has been released yet.</div>`;
        }

        const rounds = Array.from(new Set(visibleDrawEntries.map((entry) => Number(entry.round || 0))));
        return `
          <div class="stack">
            ${rounds
              .map((round) => {
                const roundEntries = visibleDrawEntries.filter(
                  (entry) => Number(entry.round || 0) === Number(round),
                );
                return `
                  <section class="subsurface draw-board-round">
                    <div class="section-heading">
                      <div>
                        <p class="eyebrow">${escapeHtml("Round " + round)}</p>
                        <h3>${escapeHtml(
                          roundEntries.length +
                            " room" +
                            (roundEntries.length === 1 ? "" : "s") +
                            " posted",
                        )}</h3>
                      </div>
                      <span class="role-pill">${escapeHtml(
                        getRoundControlForRound(tournament, round).motionReleased
                          ? "Motion live"
                          : "Motion locked",
                      )}</span>
                    </div>
                    <div class="draw-board-grid">
                      ${roundEntries
                        .map((entry) => {
                          const resultSummary = getDrawOfficialResultSummary(tournament, entry);
                          return `
                            <article class="draw-room-card">
                              <div class="section-heading">
                                <div>
                                  <strong>${escapeHtml(entry.room || "Room")}</strong>
                                  <p class="muted">${escapeHtml(
                                    getDrawMatchupForDisplay(tournament, entry),
                                  )}</p>
                                </div>
                                <div class="workspace-chip-row">
                                  <span class="mini-pill success">${escapeHtml(
                                    toTitleLabel(entry.status || "published"),
                                  )}</span>
                                  <span class="mini-pill warning">${escapeHtml(
                                    getRoomPriorityLabel(entry.priority),
                                  )}</span>
                                </div>
                              </div>
                              ${
                                resultSummary
                                  ? `<p class="fine-print">${escapeHtml(
                                      "Official result: " + resultSummary,
                                    )}</p>`
                                  : ""
                              }
                            </article>
                          `;
                        })
                        .join("")}
                    </div>
                  </section>
                `;
              })
              .join("")}
          </div>
        `;
      }

      function getSelectedTournamentBoardTabs(
        tournament,
        options = {},
      ) {
        const canJudge = Boolean(options.canJudge);
        const canSeeStandings = Boolean(options.canSeeStandings);
        const canSeeDraw = Boolean(options.canSeeDraw);
        const participant = options.participant || null;
        const judgeAssignments = Array.isArray(options.judgeAssignments)
          ? options.judgeAssignments
          : [];
        const releasedMotionCount = getRoundControls(tournament).filter(
          (control) => control.motionReleased,
        ).length;
        const publishedDrawCount = (tournament.draw || []).filter(
          (entry) => String(entry.status || "").trim().toLowerCase() === "published",
        ).length;
        const standings = getComputedStandings(tournament);
        const speakerStandings = getSpeakerStandings(tournament);
        const latestVisibleDraw =
          canSeeDraw || canJudge
            ? (tournament.draw || [])
                .filter((entry) => String(entry.status || "").trim().toLowerCase() === "published")
                .sort((left, right) => Number(right.round || 0) - Number(left.round || 0))[0] || null
            : null;
        const latestMotion = getRoundControls(tournament)
          .filter((control) => control.motionReleased)
          .sort((left, right) => Number(right.round || 0) - Number(left.round || 0))[0] || null;
        const topStanding = canSeeStandings ? standings[0] || null : null;

        return [
          {
            key: "overview",
            label: "Overview",
            badge: tournament.rounds + " rounds",
            note: "Current tournament snapshot",
            render: () => `
              <div class="tournament-board-summary">
                <div class="viewer-summary-grid">
                  <article class="viewer-summary-card">
                    <span class="muted">Latest draw</span>
                    <strong>${escapeHtml(
                      latestVisibleDraw
                        ? "Round " + latestVisibleDraw.round + " • " + latestVisibleDraw.room
                        : canSeeDraw
                          ? "Awaiting release"
                          : "Private",
                    )}</strong>
                    <p class="fine-print">${escapeHtml(
                      latestVisibleDraw
                        ? getDrawMatchupForDisplay(tournament, latestVisibleDraw)
                        : canSeeDraw
                          ? "The latest room release will appear here."
                          : "The draw is not public for this tournament.",
                    )}</p>
                  </article>
                  <article class="viewer-summary-card">
                    <span class="muted">Latest motion</span>
                    <strong>${escapeHtml(
                      latestMotion
                        ? "Round " + latestMotion.round
                        : "Awaiting release",
                    )}</strong>
                    <p class="fine-print">${escapeHtml(
                      latestMotion?.motionTitle ||
                        "Released motions appear here as soon as tab opens them.",
                    )}</p>
                  </article>
                  <article class="viewer-summary-card">
                    <span class="muted">Leaderboard</span>
                    <strong>${escapeHtml(
                      topStanding
                        ? "#" + topStanding.rank + " " + getStandingDisplayName(tournament, topStanding)
                        : canSeeStandings
                          ? "Awaiting results"
                          : "Private",
                    )}</strong>
                    <p class="fine-print">${escapeHtml(
                      topStanding
                        ? getStandingSummaryText(tournament, topStanding)
                        : canSeeStandings
                          ? "Standings update automatically from official ballots."
                          : "Standings are currently hidden publicly.",
                    )}</p>
                  </article>
                  <article class="viewer-summary-card">
                    <span class="muted">${escapeHtml(
                      participant ? "Your entry" : canJudge ? "Your judging rooms" : "Access",
                    )}</span>
                    <strong>${escapeHtml(
                      participant
                        ? participant.teamName || participant.name
                        : canJudge
                          ? judgeAssignments.length + " room" + (judgeAssignments.length === 1 ? "" : "s")
                          : toTitleLabel(getTournamentAccess(tournament)),
                    )}</strong>
                    <p class="fine-print">${escapeHtml(
                      participant
                        ? "Open your private tab or profile from here when you need your personal tournament view."
                        : canJudge
                          ? "Use the judging dashboard for ballots and score entry."
                          : "This account can follow the tournament through the published boards.",
                    )}</p>
                  </article>
                </div>
                <div class="button-row wrap-row">
                  ${
                    participant
                      ? renderParticipantProfileButton(participant, "Open My History", true)
                      : ""
                  }
                  ${
                    participant
                      ? `<a class="inline-link" href="${escapeHtml(
                          getPrivateLink(participant.token),
                        )}" target="_blank" rel="noreferrer">Open Private Tab</a>`
                      : ""
                  }
                  ${
                    canJudge
                      ? `<button class="secondary-button" type="button" data-action="set-view" data-view="judging">Open Judging</button>`
                      : ""
                  }
                </div>
                ${renderTournamentNoticeboardPreview(tournament, {
                  scope: canJudge ? "judge" : "public",
                  limit: 3,
                  showEmpty: true,
                })}
              </div>
            `,
          },
          {
            key: "draw",
            label: "Draw",
            badge: canSeeDraw || canJudge ? publishedDrawCount + " posted" : "Private",
            note: "Published rooms by round",

      function getSelectedTournamentBoardState(tournament, options = {}) {
        const tabs = getSelectedTournamentBoardTabs(tournament, options);
        const preferred = String(session.selectedTournamentBoardTab || "overview")
          .trim()
          .toLowerCase();
        const active = tabs.find((tab) => tab.key === preferred) || tabs[0];
        if (session.selectedTournamentBoardTab !== active.key) {
          session.selectedTournamentBoardTab = active.key;
        }
        return { tabs, active };
      }

          { value: "archived", label: "Archived" },
          { value: "attention", label: "Needs Attention" },
          { value: "pinned", label: "Pinned" },
          { value: "recent", label: "Recent" },

          .map(
            (item) =>
              `<option value="${escapeHtml(item.value)}" ${selected(
                item.value,
                current,
              )}>${escapeHtml(item.label)}</option>`,
          )
          .join("");
      }

          .filter((tournament) => getTournamentOpsSnapshot(tournament).attentionCount > 0)
          .sort(
            (left, right) =>
              getTournamentOpsSnapshot(right).attentionCount -
                getTournamentOpsSnapshot(left).attentionCount ||
              String(left.name).localeCompare(String(right.name)),

          .slice(0, 4);

        return `

      function getFocusedTournamentSections(
        tournament,
        feedbackCategories = [],
        scoringProfile = getScoringProfile(tournament),

        const snapshot = getTournamentOpsSnapshot(tournament);
        const teams = getTournamentTeams(tournament).length;
        const standings = getComputedStandings(tournament);
        const noticeCount = Array.isArray(tournament.notices) ? tournament.notices.length : 0;

        return [
          {
            key: "spotlight",
            label: "Spotlight",
            note: "Start with the tournament's next recommended actions and watchpoints.",
            badge: snapshot.attentionCount
              ? snapshot.attentionCount + " watchpoint" + (snapshot.attentionCount === 1 ? "" : "s")
              : "Ready",
            render: () => renderTournamentSpotlight(tournament),
          },
          {
            key: "roster",
            label: "Roster",
            note: "Participants, institutions, teams, and linked entry records.",
            badge: tournament.participants.length
              ? tournament.participants.length + " entries"
              : "No entries",
            render: () => renderTournamentRosterStudio(tournament),
          },
          {
            key: "draw",
            label: "Draw Lab",
            note: "Pairings, round controls, conflict review, and release flow.",

      function getFocusedTournamentSectionState(
        tournament,
        feedbackCategories = [],
        scoringProfile = getScoringProfile(tournament),
      ) {
        const sections = getFocusedTournamentSections(
          tournament,
          feedbackCategories,
          scoringProfile,
        );
        const preferred = String(session.focusedTournamentSection || "spotlight")
          .trim()
          .toLowerCase();
        const active = sections.find((section) => section.key === preferred) || sections[0];
        if (session.focusedTournamentSection !== active.key) {
          session.focusedTournamentSection = active.key;
        }
        return { sections, active };
      }

      function renderFocusedTournamentNavigator(
        tournament,
        feedbackCategories = [],
        scoringProfile = getScoringProfile(tournament),
        sectionState = null,
      ) {
        const { sections, active } =
          sectionState ||
          getFocusedTournamentSectionState(
            tournament,
            feedbackCategories,
            scoringProfile,
          );

        return `
          <section class="surface focus-nav-shell">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Tournament Sections</p>
                <h3>Work in one focused area at a time</h3>
              </div>
              <span class="role-pill">${escapeHtml(active.label)}</span>
            </div>
            <div class="focus-nav-overview">
              <div>
                <p class="eyebrow">Currently Open</p>
                <h3>${escapeHtml(active.label)}</h3>
                <p class="muted">${escapeHtml(active.note)}</p>
              </div>
              <span class="mini-pill success">${escapeHtml(active.badge)}</span>
            </div>
            <div class="focus-nav-grid">
              ${sections
                .map(
                  (section) => `
                    <button class="focus-nav-button ${section.key === active.key ? "is-active" : ""}" type="button" data-action="set-focused-tournament-section" data-section="${escapeHtml(
                      section.key,
                    )}">
                      <strong>${escapeHtml(section.label)}</strong>
                      <span class="muted">${escapeHtml(section.note)}</span>
                      <span class="focus-nav-badge">${escapeHtml(section.badge)}</span>
                    </button>
                  `,
                )
                .join("")}
            </div>
          </section>
        `;
      }

      function getFocusedSectionShortcutKeys(activeKey = "") {
        const ordered = ["spotlight", "roster", "draw", "motions", "results", "judges", "setup"];
        return ordered.filter((key) => key !== activeKey).slice(0, 3);
      }

      function renderFocusedSectionStageBanner(tournament, active, sections = []) {
        const shortcuts = getFocusedSectionShortcutKeys(active.key)
          .map((key) => sections.find((section) => section.key === key))
          .filter(Boolean);

        return `
          <section class="focus-stage-banner">
            <div class="focus-stage-banner-top">
              <div>
                <p class="eyebrow">Current Section</p>
                <h3>${escapeHtml(active.label)}</h3>
                <p class="muted">${escapeHtml(active.note)}</p>
              </div>
              <div class="focus-stage-meta">
                <span class="role-pill">${escapeHtml(active.badge)}</span>
                <span class="mini-pill success">${escapeHtml(tournament.code)}</span>
                <span class="mini-pill success">${escapeHtml(getFormatLabel(tournament))}</span>
              </div>
            </div>
            ${
              shortcuts.length
                ? `<div class="focus-stage-links">
                    ${shortcuts
                      .map(
                        (section) => `
                          <button class="secondary-button" type="button" data-action="set-focused-tournament-section" data-section="${escapeHtml(

      function renderTournamentSpotlight(tournament) {
        const snapshot = getTournamentOpsSnapshot(tournament);
        const topStanding = getComputedStandings(tournament)[0] || null;
        const cards = [
          {
            eyebrow: "Registration",
            headline:
              tournament.participantModel === "teams"
                ? snapshot.teams
                  ? snapshot.teams + " teams"
                  : "No teams yet"
                : snapshot.speakers
                  ? snapshot.speakers + " entries"
                  : "No entries yet",
            support:
              tournament.participantModel === "teams"
                ? snapshot.teams
                  ? "Manage rosters, institutions, and linked speakers from one place."
                  : "Start by adding teams and linking speakers in the roster studio."
                : snapshot.speakers
                  ? "Participants are ready to be reviewed and paired."
                  : "Start by adding your first participants to the roster.",
            action: `<button class="secondary-button" type="button" data-action="set-focused-tournament-section" data-section="roster">Open Roster</button>`,
          },
          {
            eyebrow: "Pairings",
            headline: !snapshot.totalRooms
              ? "No rounds built"
              : snapshot.draftRooms
                ? snapshot.draftRooms + " draft rooms"
                : snapshot.publishedRooms + " published rooms",
            support: !snapshot.totalRooms
              ? snapshot.nextUnbuiltRound
                ? "Round " + snapshot.nextUnbuiltRound + " is ready to be paired."
                : "Open the draw lab to build the first room set."
              : snapshot.draftRooms
                ? "Round " + snapshot.nextDraftRound + " is ready to review or release."
                : snapshot.latestPublishedRound
                  ? "Latest public release: Round " + snapshot.latestPublishedRound + "."
                  : "Published rooms are live and visible to competitors.",
            action: snapshot.draftRooms && snapshot.nextDraftRound
              ? `<button type="button" data-action="release-round-now" data-id="${escapeHtml(
                  tournament.id,

                  snapshot.nextDraftRound,

              : `<button class="secondary-button" type="button" data-action="set-focused-tournament-section" data-section="draw">Open Draw Lab</button>`,
          },
          {
            eyebrow: "Judges",
            headline: !snapshot.judges
              ? "Judge roster empty"
              : snapshot.chairlessRooms
                ? snapshot.chairlessRooms + " rooms need chairs"
                : snapshot.judges + " judges ready",
            support: !snapshot.judges
              ? "Add judges with institutions, tiers, and chair or wing quality."
              : snapshot.chairlessRooms
                ? "Some rooms still need official chair allocations before judging."

          {

              : topStanding

                : "Awaiting rankings",
            support: snapshot.pendingBallotRooms
              ? "Published rooms still need official chair ballots before standings settle."

            action: snapshot.pendingBallotRooms
              ? `<button class="secondary-button" type="button" data-action="set-focused-tournament-section" data-section="results">Review Rankings</button>`
              : tournament.publication.showPublicStandings
                ? `<button class="secondary-button" type="button" data-action="set-focused-tournament-section" data-section="results">Open Leaderboards</button>`

                    tournament.id,

        return `
          <section class="surface spotlight-shell">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Ops Spotlight</p>

                ? `<div class="spotlight-watchlist">
                    ${snapshot.attention
                      .slice(0, 4)
                      .map(
                        (item) => `
                          <div class="spotlight-note">
                            <span class="mini-pill warning">Watch</span>
                            <span>${escapeHtml(item)}</span>
                          </div>
                        `,

      function renderTournamentSwitchCard(tournament, activeId = "") {
        const access = toTitleLabel(getTournamentAccess(tournament));

        const statusSummary = canManage
          ? snapshot.attention[0] ||
            (snapshot.latestPublishedRound
              ? "Latest released round: " + snapshot.latestPublishedRound + "."
              : "Open the tab room to manage pairings, judges, and publication.")

            ? "Latest published round: " + latestPublicDraw.round + "."

          <article class="tournament-switch-card ${activeId === tournament.id ? "is-active" : ""}">

              <div class="tournament-switch-title">
                <p class="eyebrow">Tournament</p>
                <strong>${escapeHtml(tournament.name)}</strong>
                <p class="muted">${escapeHtml(getFormatLabel(tournament))}</p>
              </div>
              <div class="button-row wrap-row compact-end-row">

                  toTitleLabel(tournament.status),

                ${
                  canPin
                    ? `<button class="pin-toggle-button ${pinned ? "is-active" : ""}" type="button" data-action="toggle-pin-tournament" data-id="${escapeHtml(

                      )}">${escapeHtml(pinned ? "Pinned" : "Pin")}</button>`

            <div class="tournament-switch-meta">

              <span class="tournament-switch-visual-line one"></span>
              <span class="tournament-switch-visual-line two"></span>

            <div class="tournament-switch-stats">

                <span class="muted">Rounds</span>
                <strong>${escapeHtml(tournament.rounds)}</strong>

              </div>
              <div class="button-row tournament-switch-actions">
                ${
                  canManage
                    ? `<button type="button" data-action="focus-tournament" data-id="${escapeHtml(
                        tournament.id,
                      )}">${escapeHtml(
                        activeId === tournament.id ? "Managing Now" : "Open Tab Room",

                    : `<button type="button" data-action="open-tournament-record" data-id="${escapeHtml(

                        tournament.id,
                      )}">Delete</button>`

                }
              </div>
            </div>
          </article>
        `;

          <div class="notice-list ${escapeHtml(options.compact ? "compact" : "")}">

      function renderRoundControlBoard(
        tournament,

        const profiles = getRoundProfiles(tournament);
        return `
          <div class="round-board-shell">
            <div class="section-heading">
              <div>
                <p class="eyebrow">${escapeHtml(canManage ? "Round Control" : "Round Progress")}</p>

              </div>
              <span class="role-pill">${escapeHtml(profiles.length)} rounds</span>
            </div>
            <div class="round-board-grid">
              ${profiles
                .map((profile) => {
                  const summary = getRoundStatusSummary(tournament, profile.round);
                  const control = getRoundControlForRound(tournament, profile.round);
                  const conflictSummary = getRoundConflictSummary(tournament, profile.round);
                  const totalRooms = summary.rooms.length;
                  const publicRoomCount = canSeeDraw ? Number(summary.published || 0) : 0;
                  const statusLabel = canManage
                    ? totalRooms && summary.officialBallots === totalRooms
                      ? "Results In"
                      : totalRooms && summary.published === totalRooms
                        ? "Released"
                        : totalRooms
                          ? "Drafting"
                          : "Awaiting Draw"
                    : !canSeeDraw
                      ? "Draw Private"
                    : publicRoomCount
                      ? summary.officialBallots >= publicRoomCount
                        ? "Results In"
                        : "Released"
                      : "Awaiting Release";
                  const statusTone =
                    statusLabel === "Results In"
                      ? "success"
                      : statusLabel === "Released"
                        ? "success"
                        : "warning";
                  return `
                    <article class="feature-panel round-board-card">
                      <div class="section-heading">
                        <div>
                          <p class="eyebrow">${escapeHtml("Round " + profile.round)}</p>
                          <h3>${escapeHtml(profile.label || "Round " + profile.round)}</h3>
                        </div>
                        <span class="mini-pill ${escapeHtml(statusTone)}">${escapeHtml(
                          statusLabel,
                        )}</span>
                      </div>
                      <p class="muted">${escapeHtml(
                        profile.notes ||
                          getRoundFormatDisplayLabel(tournament, profile, {
                            includeInheritance: false,
                          }) +
                            " • " +
                          getConfiguredStructureValue(profile.teamsPerRoom, "Flexible") +
                            " teams per room • " +
                          getConfiguredStructureValue(profile.teamSize, "Flexible") +
                            " per team",
                      )}</p>
                      ${renderRoundTimeline(tournament, profile.round, {
                        canManage,
                        canSeeStandings,
                        canSeeDraw,
                      })}
                      <div class="round-board-metrics">
                        <div class="round-board-metric">
                          <span class="muted">${escapeHtml(canManage ? "Rooms" : "Published Rooms")}</span>
                          <strong>${escapeHtml(canManage ? totalRooms : publicRoomCount)}</strong>
                        </div>
                        <div class="round-board-metric">
                          <span class="muted">Ballots</span>
                          <strong>${escapeHtml(
                            canManage
                              ? summary.officialBallots + "/" + totalRooms
                              : Math.min(summary.officialBallots, publicRoomCount) + "/" + publicRoomCount,
                          )}</strong>
                        </div>
                        ${
                          canManage
                            ? `
                                <div class="round-board-metric">
                                  <span class="muted">Released</span>
                                  <strong>${escapeHtml(summary.published + "/" + totalRooms)}</strong>
                                </div>
                                <div class="round-board-metric">
                                  <span class="muted">Ready</span>
                                  <strong>${escapeHtml(summary.fullyReady + "/" + totalRooms)}</strong>
                                </div>
                                <div class="round-board-metric">
                                  <span class="muted">Judge Check-Ins</span>
                                  <strong>${escapeHtml(
                                    summary.checkedInJudges + "/" + summary.allocations.length,
                                  )}</strong>
                                </div>
                                <div class="round-board-metric">
                                  <span class="muted">Priority</span>
                                  <strong>${escapeHtml(
                                    totalRooms
                                      ? summary.averagePriority +
                                          " • " +
                                          getRoomPriorityLabel(summary.averagePriority)
                                      : "Not set",
                                  )}</strong>
                                </div>
                              `
                            : ""
                        }
                      </div>
                      <div class="workspace-chip-row">
                        <span class="mini-pill ${escapeHtml(
                          getRoundMotionStatus(control).tone,
                        )}">${escapeHtml(getRoundMotionStatus(control).label)}</span>
                        <span class="mini-pill success">${escapeHtml(
                          getRoundPrepSummary(control),
                        )}</span>
                        ${
                          canManage
                            ? `<span class="mini-pill ${escapeHtml(
                                conflictSummary.total ? "warning" : "success",
                              )}">${escapeHtml(
                                conflictSummary.total
                                  ? conflictSummary.total + " conflict flag" + (conflictSummary.total === 1 ? "" : "s")
                                  : "No conflict flags",
                              )}</span>`
                            : ""
                        }
                      </div>
                      ${
                        canManage
                          ? `
                              <div class="button-row round-board-actions">
                                <button class="secondary-button" type="button" data-action="auto-prioritize-round" data-id="${escapeHtml(
                                  tournament.id,
                                )}" data-round="${escapeHtml(profile.round)}">Auto-Prioritise</button>
                                <button class="secondary-button" type="button" data-action="release-round-now" data-id="${escapeHtml(
                                  tournament.id,
                                )}" data-round="${escapeHtml(profile.round)}">Release Round</button>
                                <button class="danger-button" type="button" data-action="clear-draw-round" data-id="${escapeHtml(
                                  tournament.id,
                                )}" data-round="${escapeHtml(profile.round)}">Clear Round</button>
                              </div>
                            `
                          : ""
                      }
                    </article>
                  `;
                })
                .join("")}
            </div>
          </div>
        `;

      function setTournamentFormFieldValue(form, name, value) {
        const field = form?.querySelector(`[name="${name}"]`);
        if (!field) {
          return;
        }
        field.value = value === null || value === undefined ? "" : String(value);
      }

      function setTournamentFormCheckboxValue(form, name, checked) {
        const field = form?.querySelector(`[name="${name}"]`);
        if (!field) {
          return;
        }
        field.checked = Boolean(checked);
      }

      function getRoundPlannerEditorHost(form) {
        return form?.querySelector("[data-round-planner-editor]") || null;
      }

      function getRoundPlannerBaseConfigFromForm(form) {
        return {
          teamsPerRoom: normalizeOptionalCount(
            form?.querySelector('[name="teamsPerRoom"]')?.value,
            null,
          ),
          teamSize: normalizeOptionalCount(form?.querySelector('[name="teamSize"]')?.value, null),
          speakersPerSide: normalizeOptionalCount(
            form?.querySelector('[name="speakersPerSide"]')?.value,
            null,
          ),
        };
      }

      function getStoredRoundPlannerBaseConfig(form) {
        const host = getRoundPlannerEditorHost(form);
        return {
          teamsPerRoom: normalizeOptionalCount(host?.dataset.baseTeamsPerRoom, null),
          teamSize: normalizeOptionalCount(host?.dataset.baseTeamSize, null),
          speakersPerSide: normalizeOptionalCount(host?.dataset.baseSpeakersPerSide, null),
        };
      }

      function getRoundPlannerProfilesFromForm(form) {
        return Array.from(form?.querySelectorAll("[data-round-planner-row]") || []).map((row, index) => {
          const round = normalizeRoundCount(row.dataset.round || index + 1, index + 1);
          return {
            round,
            label: String(form?.querySelector(`[name="roundLabel-${round}"]`)?.value || "").trim(),
            format: normalizeRoundFormatOverride(
              form?.querySelector(`[name="roundFormat-${round}"]`)?.value,
            ),
            teamsPerRoom: normalizeOptionalCount(
              form?.querySelector(`[name="roundTeamsPerRoom-${round}"]`)?.value,
              null,
            ),
            teamSize: normalizeOptionalCount(
              form?.querySelector(`[name="roundTeamSize-${round}"]`)?.value,
              null,
            ),
            speakersPerSide: normalizeOptionalCount(
              form?.querySelector(`[name="roundSpeakersPerSide-${round}"]`)?.value,
              null,
            ),
            notes: String(form?.querySelector(`[name="roundNotes-${round}"]`)?.value || "").trim(),
          };
        });
      }

      function syncRoundPlannerProfileValueToBase(value, previousBaseValue, nextBaseValue) {
        const normalizedValue = normalizeOptionalCount(value, null);
        const normalizedPrevious = normalizeOptionalCount(previousBaseValue, null);
        const normalizedNext = normalizeOptionalCount(nextBaseValue, null);

        if (!hasConfiguredValue(normalizedValue)) {
          return normalizedValue;
        }

        if (
          hasConfiguredValue(normalizedPrevious) &&
          Number(normalizedValue) === Number(normalizedPrevious)
        ) {
          return normalizedNext;
        }

        return normalizedValue;
      }

      function alignRoundPlannerProfilesToBaseConfig(
        profiles = [],
        previousBaseConfig = {},
        nextBaseConfig = {},
      ) {
        return (Array.isArray(profiles) ? profiles : []).map((profile) => ({
          ...profile,
          teamsPerRoom: syncRoundPlannerProfileValueToBase(
            profile.teamsPerRoom,
            previousBaseConfig.teamsPerRoom,
            nextBaseConfig.teamsPerRoom,
          ),
          teamSize: syncRoundPlannerProfileValueToBase(
            profile.teamSize,
            previousBaseConfig.teamSize,
            nextBaseConfig.teamSize,
          ),
          speakersPerSide: syncRoundPlannerProfileValueToBase(
            profile.speakersPerSide,
            previousBaseConfig.speakersPerSide,
            nextBaseConfig.speakersPerSide,
          ),
        }));
      }

      function refreshTournamentRoundPlanner(form, options = {}) {
        const host = getRoundPlannerEditorHost(form);
        if (!host) {
          return;
        }

        const format = String(
          form?.querySelector('select[name="format"]')?.value || "No Standard Format",
        ).trim();
        const rounds = normalizeRoundCount(
          options.rounds ?? form?.querySelector('[name="rounds"]')?.value,
          1,
        );
        const baseConfig = {
          ...(options.baseConfig || getRoundPlannerBaseConfigFromForm(form)),
        };
        let profiles = Array.isArray(options.profiles)
          ? options.profiles
          : getRoundPlannerProfilesFromForm(form);

        if (options.syncDefaultsWithBaseConfig) {
          profiles = alignRoundPlannerProfilesToBaseConfig(
            profiles,
            getStoredRoundPlannerBaseConfig(form),
            baseConfig,
          );
        }

        host.outerHTML = renderRoundPlannerEditorContainer(rounds, profiles, baseConfig, {
          plannerGuidance: getRoundPlannerGuidance(format),
          tournamentFormat: format,
        });
      }

      function syncRoundPlannerRowFromFormat(form, round) {
        const normalizedRound = normalizeRoundCount(round, 1);
        const selectedFormat = normalizeRoundFormatOverride(
          form?.querySelector(`[name="roundFormat-${normalizedRound}"]`)?.value,
        );
        const participantModel = String(
          form?.querySelector('[name="participantModel"]')?.value || "",
        ).trim();
        const baseConfig = getRoundPlannerBaseConfigFromForm(form);
        const defaults = selectedFormat
          ? getFormatSelectionDefaults(selectedFormat, participantModel)
          : baseConfig;

        setTournamentFormFieldValue(
          form,
          "roundTeamsPerRoom-" + normalizedRound,
          defaults.teamsPerRoom,
        );
        setTournamentFormFieldValue(form, "roundTeamSize-" + normalizedRound, defaults.teamSize);
        setTournamentFormFieldValue(
          form,
          "roundSpeakersPerSide-" + normalizedRound,
          defaults.speakersPerSide,
        );
      }

      function syncTournamentRoundPlannerFields(form, defaults = {}) {
        refreshTournamentRoundPlanner(form, {
          baseConfig: defaults,
          profiles: [],
        });
      }

      function syncTournamentConfigurationForm(form, options = {}) {
        if (!form) {
          return;
        }

        const formatField = form.querySelector('select[name="format"]');
        if (!formatField) {
          return;
        }

        const format = String(formatField.value || "No Standard Format").trim();
        const participantField = form.querySelector('select[name="participantModel"]');
        const currentParticipantModel = String(participantField?.value || "").trim();
        const defaults = getFormatSelectionDefaults(
          format,
          options.preserveParticipantModel ? currentParticipantModel : "",
        );
        const participantModel =
          options.preserveParticipantModel && currentParticipantModel
            ? currentParticipantModel
            : defaults.participantModel;

        if (participantField && !options.preserveParticipantModel) {
          participantField.value = participantModel;
        }

        setTournamentFormFieldValue(form, "teamsPerRoom", defaults.teamsPerRoom);
        setTournamentFormFieldValue(form, "teamSize", defaults.teamSize);
        setTournamentFormFieldValue(form, "speakersPerSide", defaults.speakersPerSide);
        setTournamentFormFieldValue(form, "motionStyle", defaults.motionStyle);
        setTournamentFormCheckboxValue(
          form,
          "crossExaminationEnabled",
          defaults.crossExaminationEnabled,
        );
        setTournamentFormCheckboxValue(form, "rebuttalEnabled", defaults.rebuttalEnabled);
        setTournamentFormCheckboxValue(form, "randomTeamsAllowed", defaults.randomTeamsAllowed);

        const scoringMethodLabel = form.querySelector("[data-scoring-method-label]");
        if (scoringMethodLabel) {
          scoringMethodLabel.textContent = getScoringMethodFieldLabel(participantModel, format);
        }

        const scoringMethodField = form.querySelector('select[name="scoringMethod"]');
        if (scoringMethodField) {
          const preferredValue = options.useCurrentScoringValue
            ? String(scoringMethodField.value || "").trim()
            : defaults.scoringMethod;
          const nextValue = getScoringMethodValue(
            format,
            participantModel,
            preferredValue,
            { preserveBlank: true },
          );
          scoringMethodField.innerHTML = getScoringMethodOptionsMarkup(
            nextValue,
            participantModel,
            format,
          );
          scoringMethodField.value = nextValue;
        }

        const scoringNote = form.querySelector("[data-scoring-note]");
        if (scoringNote) {
          scoringNote.textContent = getScoringProfileHelperText({
            format,
            participantModel,
          });
        }

        const formatGuidance = form.querySelector("[data-format-guidance]");
        if (formatGuidance) {
          formatGuidance.textContent = getFormatStructureGuidance(format);
        }

        const plannerGuidance = form.querySelector("[data-round-planner-guidance]");
        if (plannerGuidance) {
          plannerGuidance.textContent = getRoundPlannerGuidance(format);
        }

        if (!options.preserveRoundPlanner) {
          syncTournamentRoundPlannerFields(form, defaults);
        }
      }

      function getPendingEmails() {
        const registered = new Set(state.users.map((user) => user.email));
        const pending = new Set();
        state.tournaments.forEach((tournament) => {
          ["managerEmails", "tabManagerEmails", "judgeEmails", "debaterEmails"].forEach((key) => {
            (tournament.permissions[key] || []).forEach((email) => {
              if (!registered.has(email)) {
                pending.add(email);
              }
            });
          });
        });
        return Array.from(pending).sort();
      }

      function getUserCreationLabel(user = {}) {
        const source = String(user.createdSource || "registered").trim().toLowerCase();
        if (source === "self_signup") return "Self Sign-Up";
        if (source === "manager_created") return "Manager-Created";
        if (source === "seeded") return "Seeded";
        return "Registered";
      }

      function getTrackedSignupUsers() {
        return (state.users || [])
          .filter(
            (user) =>
              String(user.createdSource || "").trim().toLowerCase() !== "seeded" &&
              normalizeEmail(user.email) !== normalizeEmail(MANAGER_EMAIL),
          )
          .sort(
            (left, right) =>
              Number(right.createdAtKey || 0) - Number(left.createdAtKey || 0) ||
              String(right.createdAt || "").localeCompare(String(left.createdAt || "")),
          );
      }

      function getSignupStats() {
        return getTrackedSignupUsers().reduce(
          (totals, user) => {
            totals.total += 1;
            if (String(user.createdSource || "").trim().toLowerCase() === "self_signup") {
              totals.selfSignup += 1;
            } else if (
              String(user.createdSource || "").trim().toLowerCase() === "manager_created"
            ) {
              totals.managerCreated += 1;
            } else {
              totals.registered += 1;
            }
            return totals;
          },
          {
            total: 0,
            selfSignup: 0,
            managerCreated: 0,
            registered: 0,
          },
        );
      }

      function renderParticipantProfileButton(participant, label = "Open Profile", secondary = false) {
        if (!participant) {

          getParticipantIdentityKey(participant),

      function getParticipantContactMailtoHref(profile) {
        const email = normalizeEmail(profile?.email);
        if (!email) {
          return "";
        }

        const contactName = String(profile?.name || "Participant").trim() || "Participant";
        const subject = encodeURIComponent("JADE Contact | " + contactName);
        return "mailto:" + email + "?subject=" + subject;
      }

      function renderParticipantContactActions(profile, options = {}) {
        const email = normalizeEmail(profile?.email);
        if (!email) {
          return options.showFallback
            ? `<span class="mini-pill warning">No contact email</span>`
            : "";
        }

        const emailLabel = String(options.emailLabel || "Email").trim() || "Email";
        const copyLabel = String(options.copyLabel || "Copy Email").trim() || "Copy Email";

        return `
          <a class="inline-link" href="${escapeHtml(getParticipantContactMailtoHref(profile))}">${escapeHtml(
            emailLabel,
          )}</a>
          <button class="secondary-button" type="button" data-action="copy-participant-email" data-email="${escapeHtml(
            email,
          )}" data-name="${escapeHtml(profile?.name || "Participant")}">${escapeHtml(copyLabel)}</button>

      function renderTournamentNavigationButton(tournament, label = "Open Tournament", secondary = false) {
        if (!tournament) {

      function getLinkRecords() {
        const records = [];
        state.tournaments.forEach((tournament) => {
          tournament.participants.forEach((participant) => {
            const canSee =
              canManageTournament(tournament) ||
              normalizeEmail(participant.email) === normalizeEmail(session.userEmail);
            if (canSee) {
              records.push({ tournament, participant });
            }
          });
        });
        return records;
      }

      function getTournamentAppointeeDashboard() {
        return state.tournaments
          .map((tournament) => {
            const sections = [
              { key: "managerEmails", label: "Managers" },
              { key: "tabManagerEmails", label: "Tab Managers" },
              { key: "judgeEmails", label: "Judges" },
              { key: "debaterEmails", label: "Debaters" },
            ]
              .map((section) => ({
                ...section,
                entries: (tournament.permissions?.[section.key] || [])
                  .map((email) => {
                    const normalizedEmail = normalizeEmail(email);
                    const user = state.users.find((entry) => entry.email === normalizedEmail) || null;
                    return {
                      email: normalizedEmail,
                      name: String(user?.name || "").trim(),
                      registered: Boolean(user),
                      active: user ? user.active !== false : false,
                      roleKey: section.key,
                    };
                  })
                  .sort((left, right) =>
                    String(left.name || left.email).localeCompare(String(right.name || right.email)),
                  ),
              }))
              .filter((section) => section.entries.length);

            return {
              tournament,
              sections,
              total: sections.reduce((count, section) => count + section.entries.length, 0),
            };
          })
          .filter((entry) => entry.total > 0);
      }
