      function getTournamentJudges(tournament) {
        const catalog = new Map();

        (Array.isArray(tournament.judges) ? tournament.judges : []).forEach((record) => {
          const judge = normalizeJudgeRecord(record);
          if (judge.email) {
            catalog.set(judge.email, judge);
          }
        });

        (tournament.permissions?.judgeEmails || []).forEach((email) => {
          const normalizedEmail = normalizeEmail(email);
          if (!normalizedEmail) return;
          if (!catalog.has(normalizedEmail)) {
            const linkedUser = state.users.find((user) => user.email === normalizedEmail);
            catalog.set(
              normalizedEmail,
              createJudgeRecord(
                linkedUser?.name || normalizedEmail.split("@")[0],
                normalizedEmail,
              ),
            );
          }
        });

        return Array.from(catalog.values()).sort(
          (left, right) =>
            compareJudgesByQuality(left, right) ||
            String(left.email).localeCompare(String(right.email)),
        );
      }

      function getJudgeByEmail(tournament, email) {
        const target = normalizeEmail(email);
        return getTournamentJudges(tournament).find((judge) => judge.email === target) || null;
      }

      function getJudgeOptionsMarkup(tournament, currentEmail = "") {
        const judges = getTournamentJudges(tournament);
        if (!judges.length) {
          return `<option value="">No judges added yet</option>`;
        }
        return judges
          .map(
            (judge) =>
              `<option value="${escapeHtml(judge.email)}" ${selected(
                judge.email,
                currentEmail,
              )}>${escapeHtml(
                getJudgeDisplayLabel(judge) +
                  " • " +
                  getJudgePanelQualityLabel(judge.panelQuality) +
                  " / " +
                  getJudgeQualityTierLabel(judge.qualityTier),
              )}</option>`,
          )
          .join("");
      }

      function inferParticipantIdsFromMatchup(tournament, matchup) {
        const text = String(matchup || "").trim().toLowerCase();
        if (!text) {
          return [];
        }

        const found = new Set();
        (tournament.participants || []).forEach((participant) => {
          const normalized = normalizeParticipantRecord(participant);
          const searchTerms = [
            normalized.name,
            normalized.teamName,
            normalized.institution,
            normalized.institution && normalized.teamName
              ? normalized.institution + " " + normalized.teamName
              : "",
          ]
            .map((value) => String(value || "").trim().toLowerCase())
            .filter(Boolean);
          if (searchTerms.some((term) => term && text.includes(term))) {
            found.add(normalized.id);
          }
        });
        return Array.from(found);
      }

      function inferTeamIdsFromMatchup(tournament, matchup) {
        const text = String(matchup || "").trim().toLowerCase();
        if (!text) {
          return [];
        }

        return getTournamentTeams(tournament)
          .filter((team) => {
            const labels = [team.name, getTeamDisplayLabel(team)]
              .map((value) => String(value || "").trim().toLowerCase())
              .filter(Boolean);
            return labels.some((label) => text.includes(label));
          })
          .map((team) => team.id);
      }

      function getDrawEntryById(tournament, drawId) {
        return (tournament.draw || []).find((entry) => entry.id === drawId) || null;
      }

      function getParticipantsForDrawRecord(tournament, drawEntry) {
        if (!drawEntry) {
          return [];
        }

        const explicitIds = Array.isArray(drawEntry.participantIds)
          ? drawEntry.participantIds.map((id) => String(id))
          : [];
        if (explicitIds.length) {
          return (tournament.participants || [])
            .map((participant) => normalizeParticipantRecord(participant))
            .filter((participant) => explicitIds.includes(participant.id));
        }

        const inferredIds = inferParticipantIdsFromMatchup(tournament, drawEntry.matchup || "");
        return (tournament.participants || [])
          .map((participant) => normalizeParticipantRecord(participant))
          .filter((participant) => inferredIds.includes(participant.id));
      }

      function getParticipantDrawSlotDetails(tournament, drawEntry, participant) {
        if (!drawEntry || !participant) {
          return { slot: null, slotIndex: -1, label: "" };
        }

        const slotIndex = (Array.isArray(drawEntry.slots) ? drawEntry.slots : []).findIndex((slot) =>
          Array.isArray(slot.participantIds) && slot.participantIds.includes(participant.id),
        );
        const slot = slotIndex >= 0 ? drawEntry.slots[slotIndex] : null;
        return {
          slot,
          slotIndex,
          label: slot
            ? getDrawSlotDisplayLabel(tournament, slot, {
                drawEntry,
                slotIndex,
                forcePrivate: true,
              })
            : participant.teamName
              ? participant.teamName
              : participant.institution || "Individual",
        };
      }

      function orderParticipantsForDrawEntry(tournament, drawEntry, participants = []) {
        return [...(Array.isArray(participants) ? participants : [])].sort((left, right) => {
          const leftSlot = getParticipantDrawSlotDetails(tournament, drawEntry, left);
          const rightSlot = getParticipantDrawSlotDetails(tournament, drawEntry, right);
          const leftPosition =
            leftSlot.slot && Array.isArray(leftSlot.slot.participantIds)
              ? leftSlot.slot.participantIds.indexOf(left.id)
              : -1;
          const rightPosition =
            rightSlot.slot && Array.isArray(rightSlot.slot.participantIds)
              ? rightSlot.slot.participantIds.indexOf(right.id)
              : -1;

          return (
            leftSlot.slotIndex - rightSlot.slotIndex ||
            leftPosition - rightPosition ||
            String(left.name || "").localeCompare(String(right.name || ""))
          );
        });
      }

      function getDrawRoleDisplayLabels(tournament, drawEntry) {
        const slots = Array.isArray(drawEntry?.slots) ? drawEntry.slots : [];
        return slots
          .map((slot, index) =>
            getDrawSlotDisplayLabel(tournament, slot, {
              drawEntry,
              slotIndex: index,
              forcePrivate: true,
            }),
          )
          .filter(Boolean);
      }

      function createJudgeAllocationRecord(tournament, drawEntry, judgeEmail, extras = {}) {
        const participants = getParticipantsForDrawRecord(tournament, drawEntry);
        const normalizedJudgeEmail = normalizeEmail(judgeEmail || extras.judgeEmail);
        const judgeRecord = getJudgeByEmail(tournament, normalizedJudgeEmail);
        const defaultRole =
          normalizeJudgePanelQuality(judgeRecord?.panelQuality) === "chair" ? "chair" : "panelist";
        return {
          id: extras.id || createId("allocation"),
          drawId: String(drawEntry?.id || extras.drawId || "").trim(),
          round: Number(drawEntry?.round || extras.round || 1),
          room: String(drawEntry?.room || extras.room || "").trim(),
          matchup: String(drawEntry?.matchup || extras.matchup || "").trim(),
          judgeEmail: normalizedJudgeEmail,
          panelRole: normalizeJudgeAllocationRole(extras.panelRole || extras.role, defaultRole),
          status: String(extras.status || "assigned").trim(),
          participantIds: Array.isArray(extras.participantIds)
            ? extras.participantIds.map((id) => String(id))
            : participants.map((participant) => participant.id),
          checkedIn: Boolean(extras.checkedIn),
          checkedInAt: String(extras.checkedInAt || "").trim(),
          checkedInAtKey: normalizeTimestampKey(extras.checkedInAtKey, extras.checkedInAt),
          submittedAt: String(extras.submittedAt || "").trim(),
          submittedAtKey: normalizeTimestampKey(extras.submittedAtKey, extras.submittedAt),
          createdAt: extras.createdAt || timestamp(),
        };
      }

      function normalizeJudgeAllocationRecord(record, tournament) {
        const drawEntry = getDrawEntryById(tournament, record?.drawId || "");
        return createJudgeAllocationRecord(
          tournament,
          drawEntry,
          record?.judgeEmail || "",
          {
            id: record?.id,
            drawId: record?.drawId,
            round: record?.round,
            room: record?.room,
            matchup: record?.matchup,
            panelRole: record?.panelRole || record?.role,
            status: record?.status,
            participantIds: record?.participantIds,
            checkedIn: record?.checkedIn,
            checkedInAt: record?.checkedInAt,
            checkedInAtKey: record?.checkedInAtKey,
            submittedAt: record?.submittedAt,
            submittedAtKey: record?.submittedAtKey,
            createdAt: record?.createdAt,
          },
        );
      }

      function getJudgeAllocationsForTournament(tournament) {
        return (Array.isArray(tournament.judgeAllocations) ? tournament.judgeAllocations : [])
          .map((allocation) => normalizeJudgeAllocationRecord(allocation, tournament))
          .sort(
            (left, right) =>
              Number(left.round) - Number(right.round) ||
              String(left.room).localeCompare(String(right.room)) ||
              String(left.judgeEmail).localeCompare(String(right.judgeEmail)),
          );
      }

      function getAllocationsForDrawEntry(tournament, drawId) {
        return getJudgeAllocationsForTournament(tournament).filter(
          (allocation) => allocation.drawId === drawId,
        );
      }

      function getRoomJudgeComposition(tournament, drawId, excludeAllocationId = "") {
        const allocations = getAllocationsForDrawEntry(tournament, drawId).filter(
          (allocation) => allocation.id !== excludeAllocationId,
        );
        const chairCount = allocations.filter(
          (allocation) =>
            normalizeJudgeAllocationRole(allocation.panelRole, "panelist") === "chair",
        ).length;
        const panelCount = allocations.length - chairCount;

        return {
          allocations,
          chairCount,
          panelCount,
          total: allocations.length,
        };
      }

      function getChairAllocationForDrawEntry(tournament, drawId, excludeAllocationId = "") {
        return (
          getAllocationsForDrawEntry(tournament, drawId).find(
            (allocation) =>
              allocation.id !== excludeAllocationId &&
              normalizeJudgeAllocationRole(allocation.panelRole, "panelist") === "chair",
          ) || null
        );
      }

      function getJudgeAllocationForRound(
        tournament,
        judgeEmail,
        round,
        excludeAllocationId = "",
      ) {
        const targetEmail = normalizeEmail(judgeEmail);
        return (
          getJudgeAllocationsForTournament(tournament).find(
            (allocation) =>
              allocation.id !== excludeAllocationId &&
              Number(allocation.round) === Number(round) &&
              normalizeEmail(allocation.judgeEmail) === targetEmail,
          ) || null
        );
      }

      function areAllDrawEntriesCheckedIn(drawEntry) {
        if (!Array.isArray(drawEntry?.slots) || !drawEntry.slots.length) {
          return false;
        }
        return drawEntry.slots.every(
          (slot) => Boolean(drawEntry.entryCheckIns?.[getDrawSlotCheckInKey(slot)]),
        );
      }

      function getOfficialBallotAllocationForDraw(tournament, drawEntry) {
        const chair = getChairAllocationForDrawEntry(tournament, drawEntry?.id || "");
        if (chair?.submittedAt) {
          return chair;
        }
        return null;
      }

      function getRoundStatusSummary(tournament, round) {
        const rooms = (tournament.draw || [])
          .filter((entry) => Number(entry.round) === Number(round))
          .sort(
            (left, right) =>
              Number(right.priority || 0) - Number(left.priority || 0) ||
              String(left.room || "").localeCompare(String(right.room || "")),
          );
        const allocations = getJudgeAllocationsForTournament(tournament).filter(
          (allocation) => Number(allocation.round) === Number(round),
        );
        const chairs = allocations.filter(
          (allocation) =>
            normalizeJudgeAllocationRole(allocation.panelRole, "panelist") === "chair",
        );
        const checkedInEntries = rooms.filter((entry) => areAllDrawEntriesCheckedIn(entry)).length;
        const checkedInJudges = allocations.filter((allocation) => allocation.checkedIn).length;
        const published = rooms.filter(
          (entry) => String(entry.status || "").trim().toLowerCase() === "published",
        ).length;
        const officialBallots = rooms.filter((entry) =>
          Boolean(getOfficialBallotAllocationForDraw(tournament, entry)),
        ).length;
        const ballotReturns = rooms.filter((entry) => Boolean(entry.ballotCheckedIn)).length;
        const fullyReady = rooms.filter((entry) => {
          const roomAllocations = getAllocationsForDrawEntry(tournament, entry.id);
          const hasChair = roomAllocations.some(
            (allocation) =>
              normalizeJudgeAllocationRole(allocation.panelRole, "panelist") === "chair",
          );
          return hasChair && areAllDrawEntriesCheckedIn(entry);
        }).length;
        return {
          round,
          rooms,
          allocations,
          chairs,
          checkedInEntries,
          checkedInJudges,
          published,
          officialBallots,
          ballotReturns,
          fullyReady,
          averagePriority: rooms.length
            ? roundScoreValue(
                rooms.reduce(
                  (sum, entry) => sum + normalizeRoomPriority(entry.priority, 3),
                  0,
                ) / rooms.length,
                0,
              )
            : 0,
        };
      }

      function getDrawEntryCheckInSummary(drawEntry) {
        const total = Array.isArray(drawEntry?.slots) ? drawEntry.slots.length : 0;
        const checked = (Array.isArray(drawEntry?.slots) ? drawEntry.slots : []).filter((slot) =>
          Boolean(drawEntry.entryCheckIns?.[getDrawSlotCheckInKey(slot)]),
        ).length;
        return {
          checked,
          total,
        };
      }

      function getDrawEntryIdentityKeys(drawEntry) {
        return Array.from(
          new Set(
            (Array.isArray(drawEntry?.slots) ? drawEntry.slots : [])
              .map(
                (slot) =>
                  String(slot.teamId || "").trim() ||
                  String(slot.entryId || "").trim() ||
                  normalizeTextKey(slot.teamName || slot.shortLabel || slot.label),
              )
              .filter(Boolean),
          ),
        );
      }

      function getDrawSlotInstitution(tournament, slot) {
        const team =
          (slot?.teamId &&
            getTournamentTeams(tournament).find((entry) => entry.id === String(slot.teamId).trim())) ||
          findTournamentTeamByName(
            tournament,
            slot?.teamName || slot?.shortLabel || slot?.label || "",
          );
        if (team?.institution) {
          return String(team.institution || "").trim();
        }

        const institutions = Array.from(
          new Set(
            (Array.isArray(slot?.participantIds) ? slot.participantIds : [])
              .map((participantId) =>
                (tournament.participants || []).find((entry) => entry.id === participantId),
              )
              .map((participant) => String(participant?.institution || "").trim())
              .filter(Boolean),
          ),
        );

        if (institutions.length === 1) {
          return institutions[0];
        }

        return "";
      }

      function getDrawEntryConflictReport(tournament, drawEntry) {
        if (!drawEntry) {
          return [];
        }

        const issues = [];
        const slots = Array.isArray(drawEntry.slots) ? drawEntry.slots : [];
        const currentKeys = getDrawEntryIdentityKeys(drawEntry);
        const institutionMap = new Map();

        slots.forEach((slot) => {
          const institution = getDrawSlotInstitution(tournament, slot);
          if (!institution) {
            return;
          }
          institutionMap.set(institution, (institutionMap.get(institution) || 0) + 1);
        });

        institutionMap.forEach((count, institution) => {
          if (count > 1) {
            issues.push({
              tone: "danger",
              label: "Institution clash",
              detail:
                institution +
                " appears " +
                count +
                " times in this room.",
            });
          }
        });

        (tournament.draw || [])
          .filter((entry) => Number(entry.round || 0) < Number(drawEntry.round || 0))
          .forEach((previousEntry) => {
            const previousKeys = getDrawEntryIdentityKeys(previousEntry);
            const overlap = currentKeys.filter((key) => previousKeys.includes(key));
            if (overlap.length >= 2) {
              issues.push({
                tone: "warning",
                label: "Repeat matchup",
                detail:
                  "This room repeats " +
                  overlap.length +
                  " entry matchups from Round " +
                  previousEntry.round +
                  " • " +
                  previousEntry.room +
                  ".",
              });
            }
          });

        getAllocationsForDrawEntry(tournament, drawEntry.id).forEach((allocation) => {
          const judge = getJudgeByEmail(tournament, allocation.judgeEmail);
          const judgeInstitution = String(judge?.institution || "").trim();
          if (
            judgeInstitution &&
            Array.from(institutionMap.keys()).includes(judgeInstitution)
          ) {
            issues.push({
              tone: "danger",
              label: "Judge conflict",
              detail:
                (judge?.name || allocation.judgeEmail) +
                " shares an institution with a team or speaker in this room.",
            });
          }

          (tournament.judgeAllocations || [])
            .filter(
              (previousAllocation) =>
                normalizeEmail(previousAllocation.judgeEmail) ===
                  normalizeEmail(allocation.judgeEmail) &&
                Number(previousAllocation.round || 0) < Number(drawEntry.round || 0),
            )
            .forEach((previousAllocation) => {
              const previousEntry = getDrawEntryById(tournament, previousAllocation.drawId);
              const previousKeys = getDrawEntryIdentityKeys(previousEntry);
              const overlap = currentKeys.filter((key) => previousKeys.includes(key));
              if (overlap.length) {
                issues.push({
                  tone: "warning",
                  label: "Judge repeat exposure",
                  detail:
                    (judge?.name || allocation.judgeEmail) +
                    " has already seen " +
                    overlap.length +
                    " of these entries earlier in the tournament.",
                });
              }
            });
        });

        return Array.from(
          new Map(
            issues.map((issue) => [issue.label + "::" + issue.detail, issue]),
          ).values(),
        );
      }

      function getRoundConflictSummary(tournament, round) {
        const rooms = (tournament.draw || []).filter(
          (entry) => Number(entry.round || 0) === Number(round || 0),
        );
        const flaggedRooms = rooms
          .map((entry) => ({
            entry,
            issues: getDrawEntryConflictReport(tournament, entry),
          }))
          .filter((record) => record.issues.length);
        const total = flaggedRooms.reduce((sum, record) => sum + record.issues.length, 0);
        const severe = flaggedRooms.reduce(
          (sum, record) =>
            sum + record.issues.filter((issue) => issue.tone === "danger").length,
          0,
        );

        return {
          round,
          flaggedRooms,
          total,
          severe,
        };
      }

      function getRoundTimelineStages(tournament, round, options = {}) {
        const summary = getRoundStatusSummary(tournament, round);
        const control = getRoundControlForRound(tournament, round);
        const canManage = Boolean(options.canManage);
        const canSeeStandings = Boolean(options.canSeeStandings);
        const canSeeDraw = Boolean(options.canSeeDraw);

        if (canManage) {
          return [
            {
              label: "Build",
              status: summary.rooms.length ? "done" : "pending",
              value: summary.rooms.length ? summary.rooms.length + " rooms" : "Awaiting draw",
            },
            {
              label: "Release",
              status:
                summary.rooms.length && summary.published === summary.rooms.length
                  ? "done"
                  : summary.published
                    ? "active"
                    : "pending",
              value: summary.published + "/" + summary.rooms.length,
            },
            {
              label: "Check-In",
              status:
                summary.rooms.length && summary.fullyReady === summary.rooms.length
                  ? "done"
                  : summary.checkedInEntries || summary.checkedInJudges
                    ? "active"
                    : "pending",
              value: summary.fullyReady + "/" + summary.rooms.length + " ready",
            },
            {
              label: "Motion",
              status:
                getRoundMotionStatus(control).label === "Locked"
                  ? "pending"
                  : getRoundMotionStatus(control).label === "Prep Live"
                    ? "active"
                    : "done",
              value: getRoundMotionStatus(control).label,
            },
            {
              label: "Ballots",
              status:
                summary.rooms.length && summary.officialBallots === summary.rooms.length
                  ? "done"
                  : summary.officialBallots
                    ? "active"
                    : "pending",
              value: summary.officialBallots + "/" + summary.rooms.length,
            },
          ];
        }

        const publicRooms = canSeeDraw ? summary.published : 0;
        return [
          {
            label: "Posted",
            status: publicRooms ? "done" : "pending",
            value: canSeeDraw
              ? publicRooms
                ? publicRooms + " rooms"
                : "Awaiting release"
              : "Private",
          },
          {
            label: "Motion",
            status:
              !canSeeDraw
                ? "pending"
                : getRoundMotionStatus(control).label === "Locked"
                ? "pending"
                : getRoundMotionStatus(control).label === "Prep Live"
                  ? "active"
                  : "done",
            value: canSeeDraw ? getRoundMotionStatus(control).label : "Private",
          },
          {
            label: "Prep",
            status:
              !canSeeDraw
                ? "pending"
                : getRoundMotionStatus(control).label === "Prep Live"
                ? "active"
                : control.motionReleased && getRoundPrepEndKey(control)
                  ? "done"
                  : "pending",
            value: canSeeDraw ? getRoundPrepSummary(control) : "Private",
          },
          {
            label: "Ballots",
            status:
              publicRooms && summary.officialBallots >= publicRooms
                ? "done"
                : summary.officialBallots
                  ? "active"
                  : "pending",
            value: Math.min(summary.officialBallots, publicRooms) + "/" + publicRooms,
          },
          {
            label: "Boards",
            status:
              canSeeStandings && publicRooms && summary.officialBallots >= publicRooms
                ? "done"
                : canSeeStandings && summary.officialBallots
                  ? "active"
                  : "pending",
            value: canSeeStandings ? "Standings linked" : "Private",
          },
        ];
      }

      function getBreakProjection(tournament) {
        const breakSize = normalizeOptionalBreakSize(tournament?.config?.breakSize, null);
        const standings = getComputedStandings(tournament);
        if (!breakSize || !standings.length) {
          return null;
        }

        const cutIndex = Math.min(standings.length, breakSize) - 1;
        const cutStanding = standings[cutIndex] || null;
        const nextStanding = standings[cutIndex + 1] || null;
        const bubbleWindow = standings.slice(
          Math.max(0, cutIndex - 2),
          Math.min(standings.length, cutIndex + 3),
        );
        const ops = getTournamentOpsSnapshot(tournament);

        return {
          breakSize,
          cutStanding,
          nextStanding,
          bubbleWindow,
          provisional: ops.pendingBallotRooms > 0,
          lockLabel: ops.pendingBallotRooms > 0 ? "Provisional" : "Locked",
        };
      }

      function getInstitutionDashboardRecords(tournament) {
        const records = new Map();
        const teams = getTournamentTeams(tournament);
        const standings = getComputedStandings(tournament);
        const speakerStandings = getSpeakerStandings(tournament);

        function getRecord(institution) {
          const key = String(institution || "").trim();
          if (!key) {
            return null;
          }
          if (!records.has(key)) {
            records.set(key, {
              institution: key,
              speakers: 0,
              teams: 0,
              avgSpeakerScore: 0,
              totalSpeakerScore: 0,
              bestSpeakerRank: null,
              bestTeamRank: null,
              teamPoints: 0,
            });
          }
          return records.get(key);
        }

        (tournament.participants || []).forEach((participant) => {
          const team =
            (participant.teamId &&
              teams.find((entry) => entry.id === String(participant.teamId).trim())) ||
            findTournamentTeamByName(tournament, participant.teamName || "");
          const institution = String(
            participant.institution || team?.institution || "",
          ).trim();
          const record = getRecord(institution);
          if (!record) {
            return;
          }
          record.speakers += 1;
          record.totalSpeakerScore += Number(
            getParticipantComputedSpeakerScore(tournament, participant) || 0,
          );
          const speakerStanding = speakerStandings.find((entry) => entry.id === participant.id);
          if (speakerStanding?.speakerRank) {
            record.bestSpeakerRank =
              record.bestSpeakerRank === null ||
              Number(speakerStanding.speakerRank) < Number(record.bestSpeakerRank)
                ? speakerStanding.speakerRank
                : record.bestSpeakerRank;
          }
        });

        teams.forEach((team) => {
          const institution = String(team.institution || "").trim();
          const record = getRecord(institution);
          if (!record) {
            return;
          }
          record.teams += 1;
          const standing = standings.find(
            (entry) => normalizeTextKey(entry.name) === normalizeTextKey(team.name),
          );
          if (standing) {
            record.teamPoints += Number(standing.points || 0);
            if (standing.rank) {
              record.bestTeamRank =
                record.bestTeamRank === null || Number(standing.rank) < Number(record.bestTeamRank)
                  ? standing.rank
                  : record.bestTeamRank;
            }
          }
        });

        return Array.from(records.values())
          .map((record) => ({
            ...record,
            avgSpeakerScore: record.speakers
              ? roundScoreValue(record.totalSpeakerScore / record.speakers)
              : 0,
          }))
          .sort(
            (left, right) =>
              Number(right.teamPoints || 0) - Number(left.teamPoints || 0) ||
              Number(right.avgSpeakerScore || 0) - Number(left.avgSpeakerScore || 0) ||
              String(left.institution).localeCompare(String(right.institution)),
          );
      }

      function getJudgeAnalytics(tournament) {
        const judges = getTournamentJudges(tournament);
        const allocations = getJudgeAllocationsForTournament(tournament);
        const records = judges.map((judge) => {
          const judgeAllocations = allocations.filter(
            (allocation) => normalizeEmail(allocation.judgeEmail) === normalizeEmail(judge.email),
          );
          const chairAssignments = judgeAllocations.filter(
            (allocation) => normalizeJudgeAllocationRole(allocation.panelRole, "panelist") === "chair",
          ).length;
          const submitted = judgeAllocations.filter((allocation) => allocation.submittedAt).length;
          const checkedIn = judgeAllocations.filter((allocation) => allocation.checkedIn).length;
          const avgPriority = judgeAllocations.length
            ? roundScoreValue(
                judgeAllocations.reduce((sum, allocation) => {
                  const drawEntry = getDrawEntryById(tournament, allocation.drawId);
                  return sum + Number(drawEntry?.priority || 3);
                }, 0) / judgeAllocations.length,
                0,
              )
            : 0;
          const turnaroundValues = judgeAllocations
            .map((allocation) => {
              const drawEntry = getDrawEntryById(tournament, allocation.drawId);
              const publishedKey = normalizeTimestampKey(
                drawEntry?.publishedAtKey,
                drawEntry?.publishedAt,
              );
              const submittedKey = normalizeTimestampKey(
                allocation.submittedAtKey,
                allocation.submittedAt,
              );
              if (!publishedKey || !submittedKey || submittedKey < publishedKey) {
                return null;
              }
              return Math.round((submittedKey - publishedKey) / 60000);
            })
            .filter((value) => value !== null);

          return {
            judge,
            assigned: judgeAllocations.length,
            chairAssignments,
            panelAssignments: Math.max(0, judgeAllocations.length - chairAssignments),
            checkedIn,
            submitted,
            pending: Math.max(0, judgeAllocations.length - submitted),
            avgPriority,
            avgTurnaround: turnaroundValues.length
              ? roundScoreValue(
                  turnaroundValues.reduce((sum, value) => sum + Number(value || 0), 0) /
                    turnaroundValues.length,
                  0,
                )
              : 0,
          };
        });

        return {
          records: records.sort(
            (left, right) =>
              Number(right.submitted || 0) - Number(left.submitted || 0) ||
              Number(right.assigned || 0) - Number(left.assigned || 0) ||
              String(left.judge.name || left.judge.email).localeCompare(
                String(right.judge.name || right.judge.email),
              ),
          ),
          submittedBallots: allocations.filter((allocation) => allocation.submittedAt).length,
          checkedInJudges: allocations.filter((allocation) => allocation.checkedIn).length,
          averageTurnaround: records.filter((record) => Number(record.avgTurnaround || 0) > 0).length
            ? roundScoreValue(
                records.reduce(
                  (sum, record) =>
                    sum + (Number(record.avgTurnaround || 0) > 0 ? Number(record.avgTurnaround) : 0),
                  0,
                ) /
                  records.filter((record) => Number(record.avgTurnaround || 0) > 0).length,
                0,
              )
            : 0,
        };
      }

      function getFeedbackAllocation(tournament, entry) {
        const allocationId = String(entry?.allocationId || "").trim();
        if (!allocationId) {
          return null;
        }
        return (
          getJudgeAllocationsForTournament(tournament).find(
            (allocation) => String(allocation.id) === allocationId,
          ) || null
        );
      }

      function isOfficialFeedbackEntry(tournament, entry) {
        const allocation = getFeedbackAllocation(tournament, entry);
        if (!allocation) {
          return true;
        }
        if (normalizeJudgeAllocationRole(allocation.panelRole, "chair") !== "chair") {
          return false;
        }
        const officialChair = getChairAllocationForDrawEntry(tournament, allocation.drawId);
        return !officialChair || String(officialChair.id) === String(allocation.id);
      }

      function getOfficialParticipantFeedbackEntries(tournament, participant) {
        return (participant?.feedback || []).filter((entry) =>
          isOfficialFeedbackEntry(tournament, entry),
        );
      }

      function getExistingJudgeFeedback(participant, allocationId, judgeEmail) {
        return (participant.feedback || []).find(
          (entry) =>
            String(entry.allocationId || "") === String(allocationId || "") &&
            normalizeEmail(entry.judgeEmail) === normalizeEmail(judgeEmail),
        );
      }

      function getJudgeFieldToken(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "_")
          .replace(/^_+|_+$/g, "");
      }

      function getJudgeScoreFieldName(participantId, category) {
        return "score_" + participantId + "_" + getJudgeFieldToken(category);
      }

      function getJudgeNoteFieldName(participantId) {
        return "note_" + participantId;
      }

      function getJudgeCrossQuestionFieldName(participantId) {
        return "cross_questions_" + participantId;
      }

      function getJudgeCrossResponseFieldName(participantId) {
        return "cross_responses_" + participantId;
      }

      function getJudgeRebuttalFieldName(participantId) {
        return "rebuttal_" + participantId;
      }

      function getJudgeRoomResultFieldName(slotKey) {
        return "room_result_" + getJudgeFieldToken(slotKey);
      }

      function getJudgeAssignments(email = session.userEmail) {
        const target = normalizeEmail(email);
        const assignments = [];
        state.tournaments.forEach((tournament) => {
          getJudgeAllocationsForTournament(tournament).forEach((allocation) => {
            if (normalizeEmail(allocation.judgeEmail) !== target) {
              return;
            }
            const drawEntry = getDrawEntryById(tournament, allocation.drawId);
            const participants =
              allocation.participantIds?.length
                ? (tournament.participants || [])
                    .map((participant) => normalizeParticipantRecord(participant))
                    .filter((participant) => (allocation.participantIds || []).includes(participant.id))
                : getParticipantsForDrawRecord(tournament, drawEntry);
            assignments.push({
              tournament,
              allocation,
              drawEntry,
              participants,
              judge: getJudgeByEmail(tournament, allocation.judgeEmail),
            });
          });
        });
        return assignments.sort(
          (left, right) =>
            Number(left.allocation.round) - Number(right.allocation.round) ||
            String(left.allocation.room).localeCompare(String(right.allocation.room)),
        );
      }

          normalizedTournament.config.roundProfiles = buildRoundProfiles(

            ? sortStandingsForTournament(tournament.standings, normalizedTournament)
            : [];
          normalizedTournament.teams = normalizeTeamsForTournament(
            normalizedTournament.teams,
            normalizedTournament,
          );
          normalizedTournament.draw = Array.isArray(tournament.draw)
            ? tournament.draw.map((drawEntry) =>
                createDrawRecord(normalizedTournament, {
                  ...drawEntry,

                  room: drawEntry.room,
                  matchup: drawEntry.matchup,

                  entryIds: Array.isArray(drawEntry.entryIds) ? clone(drawEntry.entryIds) : [],
                  teamIds: Array.isArray(drawEntry.teamIds) ? clone(drawEntry.teamIds) : [],
                  participantIds: Array.isArray(drawEntry.participantIds)

            : [];
          normalizedTournament.judges = normalizedTournament.judges.map((judge) =>
            normalizeJudgeRecord(judge),
          );
          normalizedTournament.judgeAllocations = normalizedTournament.judgeAllocations.map(
            (allocation) => normalizeJudgeAllocationRecord(allocation, normalizedTournament),
          );

          return normalizedTournament;
        });

        if (!next.users.some((user) => normalizeEmail(user.email) === normalizeEmail(MANAGER_EMAIL))) {
          next.users.unshift(
            await buildUser("Joshua Atkins", MANAGER_EMAIL, "manager", MANAGER_PASSWORD, {

        }

        next.recoveryRequests = next.recoveryRequests.map((request) => ({
          ...request,
          knownAccount: next.users.some((user) => user.email === request.email),
        }));

        return next;
      }

      async function loadState() {
        const cloudState = await getCloudAuthenticatedState();
        if (cloudState) {
          return cloudState;
        }

        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          return await rehydrateState(JSON.parse(saved));
        }

        const cloudBootstrapState = await getCloudBootstrapState();
        if (cloudBootstrapState) {
          return cloudBootstrapState;
        }

        const seeded = await getSeedState();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
        return seeded;

      async function acceptConfirmationDialog() {
        const pending = confirmDialog ? clone(confirmDialog) : null;
        if (!pending?.intent?.action) {
          closeConfirmationDialog();
          return;
        }

        closeConfirmationDialog(false);

        const intent = pending.intent;
        if (intent.action === "archive-tournament") {
          archiveTournament(intent.id);
          return;
        }
        if (intent.action === "delete-tournament") {
          deleteTournament(intent.id);
          return;
        }
        if (intent.action === "delete-participant") {
          deleteParticipant(intent.id, intent.participantId);
          return;
        }
        if (intent.action === "delete-team") {
          deleteTeam(intent.id, intent.teamId);
          return;
        }
        if (intent.action === "delete-standing") {
          deleteStanding(intent.id, intent.standingId);
          return;
        }
        if (intent.action === "delete-draw") {
          deleteDrawRow(intent.id, intent.drawId);
          return;
        }
        if (intent.action === "remove-judge") {
          removeJudge(intent.id, intent.judgeEmail);
          return;
        }
        if (intent.action === "delete-allocation") {
          deleteJudgeAllocation(intent.id, intent.allocationId);
          return;
        }
        if (intent.action === "reopen-ballot") {
          reopenJudgeBallot(intent.id, intent.allocationId);
          return;
        }
        if (intent.action === "remove-permission") {
          removeTournamentRole(intent.id, intent.key, intent.email);
          return;
        }
        if (intent.action === "remove-tournament-appointee") {
          removeTournamentAppointee(intent.id, intent.email);
          return;
        }
        if (intent.action === "toggle-user-active") {
          toggleUserActive(intent.email);
          return;
        }
        if (intent.action === "delete-user") {
          deleteUser(intent.email);
          return;
        }
        if (intent.action === "clear-draw-round") {
          clearDrawRound(intent.id, intent.round);
          return;
        }
        if (intent.action === "delete-notice") {
          deleteTournamentNotice(intent.id, intent.noticeId);
          return;
        }
        if (intent.action === "reset-demo") {
          await resetDemo();
          return;
        }

        renderApp();
      }

      async function applyUserAccessLinkFromUrl() {
        const url = new URL(window.location.href);
        const token = String(url.searchParams.get("access") || "").trim();
        if (!token) {
          return false;
        }

        if (await probeCloudBackend()) {
          try {
            const result = await callCloud("access_link", {
              token,
            });
            cloudRuntime.initialized = true;
            state = await rehydrateState(result.state);
            url.searchParams.delete("access");
            window.history.replaceState({}, "", url.toString());
            session.userEmail = normalizeEmail(result.userEmail || "");
            session.cloudSessionToken = String(result.sessionToken || "").trim();
            session.view = getPreferredLandingView(session.userEmail);
            session.managedTournamentId = "";
            session.selectedTournamentId = "";
            clearFlash();
            saveState();
            saveSession();
            return true;
          } catch (error) {
            url.searchParams.delete("access");
            window.history.replaceState({}, "", url.toString());
            setFlash(
              "error",
              error.code === "workspace_not_initialized"
                ? "The shared cloud workspace has not been initialized yet."
                : error.message || "That private access URL is no longer valid.",
            );
            return false;
          }
        }

        const user = getUserByAccessToken(token);
        url.searchParams.delete("access");
        window.history.replaceState({}, "", url.toString());

        if (!user) {
          setFlash("error", "That private access URL is no longer valid.");
          return false;
        }

        if (!user.active) {
          setFlash("error", "This private access URL belongs to a disabled account.");
          return false;
        }

        user.lastLoginAt = timestamp();
        user.lastPrivateAccessAt = timestamp();
        session.userEmail = user.email;
        session.cloudSessionToken = "";
        session.view = getPreferredLandingView(user.email);
        session.managedTournamentId = "";
        clearFlash();
        saveState();
        saveSession();
        return true;
      }

      async function copyTextToClipboard(text, successMessage) {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(String(text || ""));
          } else {
            const textarea = document.createElement("textarea");
            textarea.value = String(text || "");
            textarea.setAttribute("readonly", "");
            textarea.style.position = "absolute";
            textarea.style.left = "-9999px";
            document.body.appendChild(textarea);
            textarea.select();
            const copied = document.execCommand("copy");
            document.body.removeChild(textarea);
            if (!copied) {
              throw new Error("Copy command was not available.");
            }
          }
          setFlash("success", successMessage);
          renderApp();
        } catch (error) {
          setFlash("error", "Copying to the clipboard was not available in this browser.");
          renderApp();
        }
      }

      function rotateUserAccessLink(targetEmail) {
        const email = normalizeEmail(targetEmail);
        const currentEmail = normalizeEmail(session.userEmail);
        if (!email) {
          setFlash("error", "Choose an account before rotating its private URL.");
          renderApp();
          return;
        }

        if (!canAccessGlobalSettings() && email !== currentEmail) {
          setFlash("error", "You can only rotate your own private access URL.");
          renderApp();
          return;
        }

        let updated = false;
        const rotatedAt = timestamp();
        state.users = state.users.map((user) => {
          if (normalizeEmail(user.email) !== email) {
            return user;
          }
          updated = true;
          return {
            ...user,
            privateAccessToken: createId("access"),
            privateAccessIssuedAt: rotatedAt,
          };
        });

        if (!updated) {
          setFlash("error", "That account could not be found.");
          renderApp();
          return;
        }

        persist("success", "Private access URL rotated for " + email + ".");
      }

      function getFormatLabel(tournament) {
        const format = normalizeFormatName(tournament?.format);
        if (format === "No Standard Format" && tournament.customFormatName) {
          return "No Standard Format: " + tournament.customFormatName;
        }
        return format;
      }

      function getRoundFormat(tournament, roundOrProfile = null) {
        if (!tournament) {
          return "No Standard Format";
        }

        const profile =
          roundOrProfile && typeof roundOrProfile === "object"
            ? roundOrProfile
            : roundOrProfile !== null && roundOrProfile !== undefined
              ? getRoundProfileForRound(tournament, roundOrProfile)
              : null;

        return (
          normalizeRoundFormatOverride(profile?.format) ||
          normalizeFormatName(tournament.format, { allowBlank: true }) ||
          "No Standard Format"
        );
      }

      function getRoundFormatDisplayLabel(tournament, roundOrProfile = null, options = {}) {
        const profile =
          roundOrProfile && typeof roundOrProfile === "object"
            ? roundOrProfile
            : roundOrProfile !== null && roundOrProfile !== undefined
              ? getRoundProfileForRound(tournament, roundOrProfile)
              : null;
        const roundFormat = getRoundFormat(tournament, profile);
        const tournamentFormatLabel = tournament ? getFormatLabel(tournament) : roundFormat;
        if (normalizeRoundFormatOverride(profile?.format)) {
          return roundFormat;
        }
        return options.includeInheritance === false
          ? tournamentFormatLabel
          : "Tournament default • " + tournamentFormatLabel;
      }

      function getOverviewStats() {
        const visible = getVisibleTournaments();
        return {
          visibleTournaments: visible.length,
          openTournaments: visible.filter((tournament) => tournament.status === "open").length,
          registeredUsers: state.users.filter((user) => user.active).length,
          publicStandings: visible.filter((tournament) => tournament.publication.showPublicStandings)
            .length,
          privateLinks: visible.reduce(
            (count, tournament) => count + tournament.participants.length,
            0,
          ),
        };
      }

      function getUserAccessLinkRecords(email = session.userEmail) {
        const target = normalizeEmail(email);
        const canReviewAll = canAccessGlobalSettings();
        return state.users
          .filter(
            (user) =>
              user.active &&
              (canReviewAll || normalizeEmail(user.email) === target),
          )
          .sort((left, right) => {
            if (normalizeEmail(left.email) === normalizeEmail(MANAGER_EMAIL)) {
              return -1;
            }
            if (normalizeEmail(right.email) === normalizeEmail(MANAGER_EMAIL)) {
              return 1;
            }
            return String(left.name || left.email).localeCompare(
              String(right.name || right.email),
            );
          })
          .map((user) => ({
            user,
            link: getUserAccessLink(user.privateAccessToken),
          }));
      }

      function getManagerMetrics() {
        return {
          archivedTournaments: state.tournaments.filter(
            (tournament) => tournament.status === "archived",
          ).length,
          hiddenStandings: state.tournaments.filter(
            (tournament) => !tournament.publication.showPublicStandings,
          ).length,
          pendingAccounts: getPendingEmails().length,
          inactiveUsers: state.users.filter((user) => !user.active).length,
          passwordResetRequests: getOpenRecoveryRequests().length,
        };
      }

      function getOpenRecoveryRequests() {
        return (state.recoveryRequests || [])
          .filter((request) => request.status === "open")
          .sort(
            (left, right) =>
              Number(right.submittedAtKey || 0) - Number(left.submittedAtKey || 0),
          );
      }

      function buildInvitationMessage(tournament, participant) {
        return state.appSettings.portal.emailTemplate
          .replaceAll("{{name}}", participant.name)
          .replaceAll("{{tournament}}", tournament.name)
          .replaceAll("{{link}}", getPrivateLink(participant.token));
      }

      function findStandingForParticipant(tournament, participant) {
        return (
          getComputedStandings(tournament).find(
            (entry) =>
              entry.name === participant.teamName ||
              entry.name === participant.name ||
              entry.name === participant.email,
          ) || null
        );
      }

      function getParticipantById(tournament, participantId) {
        return (
          tournament.participants.find((participant) => participant.id === participantId) || null
        );
      }

      function getPortalFeedbackEntries(tournament, participant) {
        const entries = getOfficialParticipantFeedbackEntries(tournament, participant);
        return state.appSettings.portal.showOnlyLatestFeedback ? entries.slice(-1) : entries;
      }

      function getParticipantSearchTerms(participant) {
        return [...new Set([participant.name, participant.teamName, participant.email])]
          .map((value) => String(value || "").trim().toLowerCase())
          .filter(Boolean);
      }

      function getParticipantDrawEntries(tournament, participant) {
        const searchTerms = getParticipantSearchTerms(participant);
        return (tournament.draw || [])
          .filter((entry) => {
            if (String(entry.status || "").trim().toLowerCase() !== "published") {
              return false;
            }
            if (
              Array.isArray(entry.participantIds) &&
              entry.participantIds.includes(String(participant.id || "").trim())
            ) {
              return true;
            }
            const matchup = String(entry.matchup || "").toLowerCase();
            return searchTerms.some((term) => matchup.includes(term));
          })
          .sort((left, right) => Number(right.round || 0) - Number(left.round || 0));
      }

      function getPrimaryParticipantDrawEntry(tournament, participant) {
        const matchingEntries = getParticipantDrawEntries(tournament, participant);
        if (matchingEntries.length) {
          return matchingEntries[0];
        }
        return [...(tournament.draw || [])]
          .filter((entry) => String(entry.status || "").trim().toLowerCase() === "published")
          .sort((left, right) => Number(right.round || 0) - Number(left.round || 0))[0] || null;
      }

      function getStandingWindow(tournament, participant, radius = 2) {
        const sortedStandings = [...getComputedStandings(tournament)].sort(
          (left, right) => Number(left.rank || 0) - Number(right.rank || 0),
        );
        if (!sortedStandings.length) {
          return [];
        }

        const standingRecord = findStandingForParticipant(tournament, participant);
        if (!standingRecord) {
          return sortedStandings.slice(0, Math.min(sortedStandings.length, radius * 2 + 1));
        }

        const recordIndex = sortedStandings.findIndex(
          (entry) => entry.id === standingRecord.id || entry.name === standingRecord.name,
        );
        if (recordIndex < 0) {
          return sortedStandings.slice(0, Math.min(sortedStandings.length, radius * 2 + 1));
        }

        const start = Math.max(0, recordIndex - radius);
        const end = Math.min(sortedStandings.length, recordIndex + radius + 1);
        return sortedStandings.slice(start, end);
      }

      function renderPortalStandingWindow(tournament, participant) {
        const standingRecord = findStandingForParticipant(tournament, participant);
        const windowRows = getStandingWindow(tournament, participant);
        const columns = getStandingsColumns(tournament);

        if (!windowRows.length) {
          return `<div class="empty-state">No standings have been published yet.</div>`;
        }

        return `
          <div class="table-wrap">
            <table class="compact-table">
              <thead>
                <tr>
                  ${columns.map((column) => `<th>${escapeHtml(column.label)}</th>`).join("")}
                </tr>
              </thead>
              <tbody>
                ${windowRows
                  .map(
                    (entry) => `
                      <tr class="${
                        standingRecord &&
                        (entry.id === standingRecord.id || entry.name === standingRecord.name)
                          ? "highlight-row"
                          : ""
                      }">
                        ${columns
                          .map((column) => {
                            const value =
                              column.key === "name"
                                ? getStandingDisplayName(tournament, entry)
                                : getFormattedStandingCellValue(
                                    tournament,
                                    entry,
                                    column.key,
                                  );
                            return `<td>${escapeHtml(value)}</td>`;
                          })
                          .join("")}
                      </tr>
                    `,
                  )
                  .join("")}
              </tbody>
            </table>
          </div>
          <p class="table-caption">${
            standingRecord
              ? "Your current position is highlighted."
              : "This view shows the current top published entries."
          }</p>
        `;
      }

      function getSpeakerWindow(tournament, participant, radius = 2) {
        const speakerStandings = getSpeakerStandings(tournament);
        if (!speakerStandings.length) {
          return [];
        }

        const speakerRecord = speakerStandings.find((entry) => entry.id === participant.id);
        if (!speakerRecord) {
          return speakerStandings.slice(0, Math.min(speakerStandings.length, radius * 2 + 1));
        }

        const recordIndex = speakerStandings.findIndex((entry) => entry.id === speakerRecord.id);
        const start = Math.max(0, recordIndex - radius);
        const end = Math.min(speakerStandings.length, recordIndex + radius + 1);
        return speakerStandings.slice(start, end);
      }

      function renderPortalSpeakerWindow(tournament, participant) {
        const speakerWindow = getSpeakerWindow(tournament, participant);
        if (!speakerWindow.length) {
          return `<div class="empty-state">Speaker rankings will appear once judges submit ballots.</div>`;

        return `

      function renderPortalDrawWindow(tournament, participant, token = "") {
        const personalEntries = getParticipantDrawEntries(tournament, participant);
        const fallbackEntry = getPrimaryParticipantDrawEntry(tournament, participant);
        const entriesToShow = personalEntries.length ? personalEntries.slice(0, 2) : fallbackEntry ? [fallbackEntry] : [];

        if (!entriesToShow.length) {
          return `<div class="empty-state">No round posting has been published yet.</div>`;
        }

        return `
          <div class="portal-round-list">
            ${entriesToShow
              .map((entry) => {
                const roundControl = getRoundControlForRound(tournament, entry.round);
                const participantSlot = (Array.isArray(entry.slots) ? entry.slots : []).find((slot) =>
                  (Array.isArray(slot.participantIds) ? slot.participantIds : []).includes(
                    participant.id,
                  ),

                const participantCheckedIn = participantSlot

                  : false;
                return `
                  <div class="portal-round-card">
                    <span class="muted">Round ${escapeHtml(entry.round)}</span>
                    <strong>${escapeHtml(entry.room)}</strong>
                    <p>${escapeHtml(getDrawMatchupForDisplay(tournament, entry))}</p>

                            participantCheckedIn ? "Undo My Check-In" : "Check In For This Round",
                          )}</button>`
                        : ""
                    }
                  </div>
                `;
              })
              .join("")}
          </div>
          <p class="table-caption">${
            personalEntries.length
              ? "Only rounds that appear to match your entry are shown here first."
              : "A general published round is shown until a row clearly matching your entry is available."
          }</p>
        `;
      }

      function getCompetitorDashboardStats(email = session.userEmail) {
        const tournaments = getDebaterTournaments(email);
        let postedRounds = 0;
        let visibleStandings = 0;
        let feedbackItems = 0;

        tournaments.forEach((tournament) => {
          const participant = getParticipantForUser(tournament, email);
          if (!participant) return;

          if (getPrimaryParticipantDrawEntry(tournament, participant)) {
            postedRounds += 1;
          }

          if (
            tournament.publication.showPublicStandings ||
            tournament.publication.showStandingsInPrivatePortal ||
            state.appSettings.portal.showStandingsInPrivatePortal
          ) {
            visibleStandings += 1;
          }

          feedbackItems += getPortalFeedbackEntries(tournament, participant).length;
        });

        return {
          tournaments: tournaments.length,
          postedRounds,
          visibleStandings,
          feedbackItems,
        };
      }

        const participant = getParticipantForUser(tournament);
        if (!participant) {

        const standing = findStandingForParticipant(tournament, participant);
        const speakerStanding = getSpeakerStandingForParticipant(tournament, participant);

        const latestRound = getPrimaryParticipantDrawEntry(tournament, participant);
        const latestFeedback =

        const entryLabel =

        return `

      function renderStandingsTable(tournament, canManage, canSeeStandings) {
        if (!canSeeStandings) {
          return `<div class="empty-state">Standings are hidden publicly for this tournament.</div>`;
        }

        const standings = getComputedStandings(tournament);
        if (!standings.length) {
          return `<div class="empty-state">Standings will appear automatically once judges submit ballots.</div>`;
        }

        const columns = getStandingsColumns(tournament);
        return `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  ${columns
                    .map((column) => `<th>${escapeHtml(column.label)}</th>`)
                    .join("")}
                </tr>
              </thead>
              <tbody>
                ${standings
                  .map(
                    (standing) => `
                      <tr>
                        ${columns
                          .map((column) => {
                            const value =
                              column.key === "name"
                                ? getStandingDisplayName(tournament, standing)
                                : getFormattedStandingCellValue(
                                    tournament,
                                    standing,
                                    column.key,
                                  );
                            return `<td>${escapeHtml(value)}</td>`;
                          })
                          .join("")}
                      </tr>
                    `,
                  )
                  .join("")}
              </tbody>
            </table>
          </div>
        `;
      }

      function renderDrawTable(tournament, canManage, canSeeDraw) {
        if (!canSeeDraw) {
          return `<div class="empty-state">The draw is not currently public.</div>`;
        }

        const visibleDrawEntries = canManage
          ? tournament.draw || []
          : (tournament.draw || []).filter(
              (entry) => String(entry.status || "").trim().toLowerCase() === "published",
            );

        if (!visibleDrawEntries.length) {
          return `<div class="empty-state">No draw has been posted yet.</div>`;
        }

        return `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Round</th>
                  <th>Room</th>
                  <th>Matchup</th>
                  <th>Official Result</th>
                  <th>Priority</th>
                  <th>Status</th>
                  ${canManage ? "<th>Check-In</th><th>Ballot</th>" : ""}
                  ${canManage ? "<th>Action</th>" : ""}
                </tr>
              </thead>
              <tbody>
                ${visibleDrawEntries
                  .slice()
                  .sort(
                    (left, right) =>
                      Number(left.round || 0) - Number(right.round || 0) ||
                      Number(right.priority || 0) - Number(left.priority || 0) ||
                      String(left.room || "").localeCompare(String(right.room || "")),
                  )
                  .map(
                    (entry) => {
                      const matchup = getDrawMatchupForDisplay(tournament, entry);
                      const resultSummary = getDrawOfficialResultSummary(tournament, entry);
                      const roomAllocations = getAllocationsForDrawEntry(tournament, entry.id);
                      const checkedInEntries = areAllDrawEntriesCheckedIn(entry);
                      const checkInSummary = getDrawEntryCheckInSummary(entry);
                      const conflictCount = getDrawEntryConflictReport(tournament, entry).length;
                      const panelReady = roomAllocations.some(
                        (allocation) =>
                          normalizeJudgeAllocationRole(allocation.panelRole, "panelist") ===
                          "chair",
                      );
                      return `
                        <tr>
                          <td>${escapeHtml(entry.round)}</td>
                          <td>${escapeHtml(entry.room)}</td>
                          <td>${escapeHtml(matchup)}</td>
                          <td>${escapeHtml(resultSummary || "Awaiting official result")}</td>
                          <td>${escapeHtml(
                            getRoomPriorityLabel(entry.priority) +
                              " (" +
                              normalizeRoomPriority(entry.priority, 3) +
                              ")",
                          )}</td>
                          <td>${escapeHtml(entry.status)}</td>
                          ${
                            canManage
                              ? `
                                  <td>${escapeHtml(
                                    checkedInEntries
                                      ? "All entries checked in"
                                      : panelReady
                                        ? checkInSummary.total
                                          ? checkInSummary.checked +
                                            "/" +
                                            checkInSummary.total +
                                            " checked in"
                                          : "Awaiting room check-in"
                                        : "Panel incomplete",
                                  )}</td>
                                  <td>${escapeHtml(
                                    entry.ballotCheckedIn
                                      ? "Returned"
                                      : getOfficialBallotAllocationForDraw(tournament, entry)
                                        ? "Submitted"
                                        : "Pending",
                                  )}</td>
                                  <td>
                                    <form class="compact-inline-form" data-form="update-draw-room" data-id="${escapeHtml(
                                      tournament.id,
                                    )}" data-draw-id="${escapeHtml(entry.id)}">
                                      <input type="hidden" name="status" value="${escapeHtml(
                                        entry.status,
                                      )}" />
                                      <select name="priority">${getRoomPriorityOptionsMarkup(
                                        entry.priority,
                                      )}</select>
                                      ${
                                        conflictCount
                                          ? `<span class="mini-pill warning">${escapeHtml(
                                              conflictCount + " conflict flag" + (conflictCount === 1 ? "" : "s"),
                                            )}</span>`
                                          : ""
                                      }
                                      <button class="secondary-button" type="submit">Save</button>
                                      <button class="ghost-button" type="button" data-action="toggle-room-checkin" data-id="${escapeHtml(
                                        tournament.id,
                                      )}" data-draw-id="${escapeHtml(entry.id)}">${escapeHtml(
                                        checkedInEntries ? "Clear Check-In" : "Check In Room",
                                      )}</button>
                                      <button class="ghost-button" type="button" data-action="toggle-room-ballot" data-id="${escapeHtml(
                                        tournament.id,
                                      )}" data-draw-id="${escapeHtml(entry.id)}">${escapeHtml(
                                        entry.ballotCheckedIn ? "Undo Ballot" : "Mark Ballot In",
                                      )}</button>
                                      <button class="ghost-button" type="button" data-action="delete-draw" data-id="${escapeHtml(
                                        tournament.id,
                                      )}" data-draw-id="${escapeHtml(entry.id)}">Delete</button>
                                    </form>
                                  </td>
                                `
                              : ""
                          }
                        </tr>
                      `;
                    },
                  )
                  .join("")}
              </tbody>
            </table>
          </div>
        `;
      }

      function getDrawEntryOptionsMarkup(tournament, currentDrawId = "", roundFilter = "") {
        const entries = (tournament.draw || [])
          .filter((entry) =>
            roundFilter ? Number(entry.round) === Number(roundFilter) : true,
          )
          .sort(
            (left, right) =>
              Number(left.round || 0) - Number(right.round || 0) ||
              String(left.room || "").localeCompare(String(right.room || "")),
          );

        if (!entries.length) {
          return `<option value="">No saved rooms yet</option>`;
        }

        return entries
          .map(
            (entry) =>
              `<option value="${escapeHtml(entry.id)}" ${selected(
                entry.id,
                currentDrawId,
              )}>${escapeHtml(
                "Round " + entry.round + " • " + entry.room + " • " + entry.matchup,
              )}</option>`,

          .join("");
